[package]
name = "sybil-openvm-tools"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
description = "Host tools for Sybil OpenVM artifacts"

# This package is intentionally outside the root workspace. Its encoder must
# call `openvm::serde` from the same OpenVM tag used by
# zk/openvm-guest to produce byte-for-byte CLI input compatible with
# `cargo openvm run/prove`; folding it into sybil-prover would pull the pinned
# OpenVM git dependency graph into normal workspace checks and deployments.
[workspace]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
hex = "0.4"
openvm = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0", features = ["std"] }
rmp-serde = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sybil-zk = { path = "../../crates/sybil-zk" }
sybil-escape-claim = { path = "../../crates/sybil-escape-claim" }
thiserror = "2"

[dev-dependencies]
matching-engine = { path = "../../crates/matching-engine" }
sybil-verifier = { path = "../../crates/sybil-verifier", default-features = false }
