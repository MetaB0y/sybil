[package]
name = "sybil-openvm-tools"
version = "0.1.0"
edition = "2021"
description = "Host tools for Sybil OpenVM artifacts"

# This package is intentionally outside the root workspace so normal Rust
# workspace checks do not require the OpenVM prerelease dependency graph.
[workspace]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
hex = "0.4"
openvm = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0-beta.2", features = ["std"] }
rmp-serde = "1"
serde_json = "1"
sybil-zk = { path = "../../crates/sybil-zk" }
thiserror = "2"

[dev-dependencies]
sybil-verifier = { path = "../../crates/sybil-verifier", default-features = false }
