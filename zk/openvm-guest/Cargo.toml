[package]
name = "sybil-openvm-guest"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
description = "OpenVM guest for Sybil state-transition verification"

# This package intentionally lives outside the root workspace so normal
# `cargo test --workspace` does not require the OpenVM toolchain.
[workspace]

[profile.release]
overflow-checks = true

[dependencies]
openvm = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0", features = ["std"] }
openvm-algebra-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0" }
openvm-ecc-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0" }
openvm-p256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0", package = "p256", features = ["ecdsa"] }
sybil-zk = { path = "../../crates/sybil-zk" }
