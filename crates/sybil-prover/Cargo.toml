[package]
name = "sybil-prover"
version = "0.1.0"
edition = "2021"
description = "Host-side Sybil proof job tooling"

[[bin]]
name = "sybil-prover"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
hex = "0.4"
rmp-serde = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha3 = "0.10"
sybil-witgen = { path = "../sybil-witgen", default-features = false }
sybil-zk = { path = "../sybil-zk" }
thiserror = { workspace = true }

[dev-dependencies]
sybil-verifier = { path = "../sybil-verifier" }
