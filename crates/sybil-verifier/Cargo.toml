[package]
name = "sybil-verifier"
version = "0.1.0"
edition = "2021"
description = "Comprehensive block verification for prediction market matching — ZK-ready"

[features]
default = ["qmdb"]
qmdb = [
    "dep:blake3",
    "dep:commonware-codec",
    "dep:commonware-cryptography",
    "dep:commonware-runtime",
    "dep:commonware-storage",
]

[dependencies]
matching-engine = { path = "../matching-engine" }
blake3 = { version = "1", optional = true }
commonware-codec = { version = "2026.4.0", optional = true }
commonware-cryptography = { version = "2026.4.0", optional = true }
commonware-runtime = { version = "2026.4.0", optional = true }
commonware-storage = { version = "2026.4.0", optional = true }
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
thiserror = { workspace = true }

[dev-dependencies]
proptest = "1.6"
