[package]
name = "sybil-verifier"
version = "0.1.0"
edition = "2021"
description = "Comprehensive block verification for prediction market matching — ZK-ready"

[features]
default = ["qmdb"]
qmdb = [
    "dep:commonware-codec",
    "dep:commonware-cryptography",
    "dep:commonware-runtime",
    "dep:commonware-storage",
]

[dependencies]
matching-engine = { path = "../matching-engine" }
sybil-l1-protocol = { path = "../sybil-l1-protocol" }
blake3 = "1"
commonware-codec = { version = "2026.4.0", optional = true }
commonware-cryptography = { version = "2026.4.0", optional = true }
commonware-runtime = { version = "2026.4.0", optional = true }
commonware-storage = { version = "2026.4.0", optional = true }
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
thiserror = { workspace = true }

[target.'cfg(not(target_os = "zkvm"))'.dependencies]
p256 = { version = "0.13", features = ["ecdsa"] }

[target.'cfg(target_os = "zkvm")'.dependencies]
openvm-p256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0", package = "p256", features = ["ecdsa"] }

[dev-dependencies]
proptest = "1.6"
serde_json = "1"

[lints.clippy]
# f64 ban (SYB-196) is scoped to the consensus crates (matching-engine,
# matching-sequencer). This crate is not on the state-root arithmetic path;
# opt out so macro-generated / off-chain f64 does not trip the workspace lint.
disallowed_types = "allow"
