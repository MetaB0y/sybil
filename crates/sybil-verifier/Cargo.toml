[package]
name = "sybil-verifier"
version = "0.1.0"
edition = "2021"
description = "Comprehensive block verification for prediction market matching — ZK-ready"

[dependencies]
matching-engine = { path = "../matching-engine" }
blake3 = "1"
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
thiserror = { workspace = true }

[dev-dependencies]
proptest = "1.6"
