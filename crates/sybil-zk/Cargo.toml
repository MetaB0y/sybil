[package]
name = "sybil-zk"
version = "0.1.0"
edition = "2021"
description = "ZK public input binding and guest-safe Sybil verification entrypoints"

[dependencies]
blake3 = "1"
serde = { version = "1", features = ["derive"] }
sha2 = { version = "0.10", default-features = false }
sha3 = "0.10"
sybil-l1-protocol = { path = "../sybil-l1-protocol" }
sybil-verifier = { path = "../sybil-verifier", default-features = false }

[target.'cfg(target_os = "zkvm")'.dependencies]
# Use OpenVM's supported incremental SHA-2 implementation in the guest. Keeping
# this target-specific preserves the native verifier's `sha2` implementation.
openvm-sha2 = { git = "https://github.com/openvm-org/openvm.git", tag = "v2.0.0", default-features = false }

[dev-dependencies]
commonware-codec = "2026.4.0"
commonware-cryptography = "2026.4.0"
commonware-runtime = "2026.4.0"
commonware-storage = "2026.4.0"
matching-engine = { path = "../matching-engine" }
p256 = { version = "0.13", features = ["ecdsa"] }
serde_json = "1"

[lints.clippy]
# f64 ban (SYB-196) is scoped to the consensus crates (matching-engine,
# matching-sequencer). This crate is not on the state-root arithmetic path;
# opt out so macro-generated / off-chain f64 does not trip the workspace lint.
disallowed_types = "allow"
