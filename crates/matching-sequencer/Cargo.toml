[package]
name = "matching-sequencer"
version = "0.1.0"
edition = "2021"
description = "Agent-based multi-batch simulation for prediction market matching"

[[bin]]
name = "sybil-sim"
path = "src/bin/sybil_sim.rs"

[dependencies]
matching-engine = { path = "../matching-engine" }
matching-solver = { path = "../matching-solver", features = ["milp"] }
rand = { workspace = true }
rand_chacha = { workspace = true }
clap = { version = "4.5", features = ["derive"] }
comfy-table = "7"
