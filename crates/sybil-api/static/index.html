<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sybil</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
  :root { --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e; --text: #e0e0e8; --dim: #6b6b80; --green: #4ade80; --red: #f87171; --blue: #60a5fa; --yellow: #fbbf24; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  header h1 { font-size: 16px; font-weight: 600; }
  .status { display: flex; gap: 16px; color: var(--dim); font-size: 12px; }
  .status .live { color: var(--green); }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .stat .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 20px; font-weight: 600; margin-top: 4px; }
  .stat .value.green { color: var(--green); }
  .stat .value.red { color: var(--red); }
  h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); margin: 20px 0 8px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: 6px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(255,255,255,0.02); }
  .price { font-variant-numeric: tabular-nums; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .blue { color: var(--blue); }
  .dim { color: var(--dim); }
  .bar-bg { background: var(--border); border-radius: 2px; height: 4px; width: 80px; display: inline-block; vertical-align: middle; }
  .bar-fill { background: var(--blue); height: 100%; border-radius: 2px; }
  .groups { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .group-tag { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; }
  .group-tag.active { border-color: var(--blue); color: var(--blue); }
  .blocks { max-height: 200px; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; }
  .block-line { padding: 2px 0; border-bottom: 1px solid var(--border); display: flex; gap: 16px; }
  .block-line:last-child { border-bottom: none; }
  .positions table { font-size: 12px; }
</style>
</head>
<body>
<div class="container" x-data="dashboard()" x-init="start()">

  <header>
    <h1>sybil</h1>
    <div class="status">
      <span>block <strong x-text="health.height || '...'"></strong></span>
      <span class="live" x-show="health.status === 'ok'">live</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="label">Markets</div>
      <div class="value" x-text="markets.length"></div>
    </div>
    <div class="stat">
      <div class="label">Groups</div>
      <div class="value" x-text="groups.length"></div>
    </div>
    <div class="stat">
      <div class="label">MM Balance</div>
      <div class="value" :class="mmPnl >= 0 ? 'green' : 'red'" x-text="'$' + mmBalance"></div>
    </div>
    <div class="stat">
      <div class="label">MM PnL</div>
      <div class="value" :class="mmPnl >= 0 ? 'green' : 'red'" x-text="(mmPnl >= 0 ? '+$' : '-$') + Math.abs(mmPnl).toLocaleString()"></div>
    </div>
    <div class="stat">
      <div class="label">Positions</div>
      <div class="value" x-text="mmPositions"></div>
    </div>
    <div class="stat">
      <div class="label">Last Block Volume</div>
      <div class="value" x-text="'$' + lastVolume"></div>
    </div>
  </div>

  <!-- Group filter -->
  <div class="groups">
    <span class="group-tag" :class="selectedGroup === null && 'active'" @click="selectedGroup = null">All</span>
    <template x-for="g in groups" :key="g.name">
      <span class="group-tag" :class="selectedGroup === g.name && 'active'" @click="selectedGroup = selectedGroup === g.name ? null : g.name" x-text="g.name + ' (' + g.market_ids.length + ')'"></span>
    </template>
  </div>

  <!-- Markets table -->
  <h2>Markets</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Market</th>
        <th>Yes</th>
        <th>No</th>
        <th></th>
        <th>Volume</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <template x-for="m in filteredMarkets" :key="m.market_id">
        <tr>
          <td class="dim" x-text="m.market_id"></td>
          <td x-text="m.name.length > 60 ? m.name.slice(0, 57) + '...' : m.name"></td>
          <td class="price green" x-text="fmt(m.yes_price_nanos)"></td>
          <td class="price red" x-text="fmt(m.no_price_nanos)"></td>
          <td>
            <span class="bar-bg"><span class="bar-fill" :style="'width:' + pct(m.yes_price_nanos) + '%'"></span></span>
          </td>
          <td class="dim price" x-text="'$' + dollars(m.volume_nanos)"></td>
          <td>
            <span :class="m.status === 'active' ? 'green' : 'dim'" x-text="m.status"></span>
          </td>
        </tr>
      </template>
    </tbody>
  </table>

  <!-- Recent blocks -->
  <h2>Recent Blocks</h2>
  <div class="blocks">
    <template x-for="b in recentBlocks.slice().reverse()" :key="b.height">
      <div class="block-line">
        <span class="dim" x-text="'#' + b.height"></span>
        <span x-text="b.orders_filled + ' fills'"></span>
        <span class="blue" x-text="'$' + dollars(b.total_volume_nanos)"></span>
        <span class="dim" x-text="'W: $' + dollars(b.total_welfare_nanos)"></span>
      </div>
    </template>
    <div x-show="recentBlocks.length === 0" class="dim">waiting for blocks...</div>
  </div>

  <!-- MM Positions -->
  <template x-if="portfolio && portfolio.positions && portfolio.positions.length > 0">
    <div class="positions">
      <h2>MM Positions</h2>
      <table>
        <thead><tr><th>Market</th><th>Side</th><th>Qty</th><th>Value</th></tr></thead>
        <tbody>
          <template x-for="p in portfolio.positions" :key="p.market_id + p.outcome">
            <tr>
              <td x-text="marketName(p.market_id)"></td>
              <td :class="p.outcome === 'YES' ? 'green' : 'red'" x-text="p.outcome"></td>
              <td class="price" x-text="p.quantity"></td>
              <td class="price dim" x-text="'$' + dollars(p.value_nanos)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

</div>

<script>
function dashboard() {
  return {
    health: {},
    markets: [],
    groups: [],
    portfolio: null,
    recentBlocks: [],
    selectedGroup: null,
    mmAccountId: 0,

    get filteredMarkets() {
      if (!this.selectedGroup) return this.markets;
      const g = this.groups.find(g => g.name === this.selectedGroup);
      if (!g) return this.markets;
      const ids = new Set(g.market_ids);
      return this.markets.filter(m => ids.has(m.market_id));
    },

    get mmBalance() {
      if (!this.portfolio || this.portfolio.balance_nanos == null) return '...';
      return Math.round(this.portfolio.balance_nanos / 1e9).toLocaleString();
    },

    get mmPnl() {
      if (!this.portfolio || this.portfolio.pnl_nanos == null) return 0;
      return Math.round(this.portfolio.pnl_nanos / 1e9);
    },

    get mmPositions() {
      if (!this.portfolio || !this.portfolio.positions) return 0;
      return this.portfolio.positions.length;
    },

    get lastVolume() {
      if (this.recentBlocks.length === 0) return '0';
      const last = this.recentBlocks[this.recentBlocks.length - 1];
      return this.dollars(last.total_volume_nanos);
    },

    fmt(nanos) {
      if (!nanos) return '-';
      return (nanos / 1e9).toFixed(3);
    },

    pct(nanos) {
      if (!nanos) return 0;
      return Math.round(nanos / 1e7);
    },

    dollars(nanos) {
      if (!nanos) return '0';
      return Math.round(nanos / 1e9).toLocaleString();
    },

    marketName(id) {
      const m = this.markets.find(m => m.market_id === id);
      if (!m) return '#' + id;
      return m.name.length > 40 ? m.name.slice(0, 37) + '...' : m.name;
    },

    async poll() {
      try {
        const [h, m, g] = await Promise.all([
          fetch('/v1/health').then(r => r.json()),
          fetch('/v1/markets').then(r => r.json()),
          fetch('/v1/markets/groups').then(r => r.json()),
        ]);
        this.health = h;
        this.markets = m.sort((a, b) => (b.volume_nanos || 0) - (a.volume_nanos || 0));
        this.groups = g;

        // Find MM account — scan first few accounts, pick the one with most positions
        let bestPortfolio = null;
        for (const id of [0, 1, 2, 3]) {
          try {
            const resp = await fetch('/v1/accounts/' + id + '/portfolio');
            if (!resp.ok) continue;
            const p = await resp.json();
            if (!bestPortfolio || (p.positions || []).length > (bestPortfolio.positions || []).length) {
              bestPortfolio = p;
              this.mmAccountId = id;
            }
          } catch {}
        }
        if (bestPortfolio) this.portfolio = bestPortfolio;
      } catch (e) {
        console.error('poll failed:', e);
      }
    },

    async streamBlocks() {
      try {
        const resp = await fetch('/v1/blocks/stream');
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('data:')) {
              try {
                const block = JSON.parse(line.slice(5).trim());
                this.recentBlocks.push(block);
                if (this.recentBlocks.length > 50) this.recentBlocks.shift();
                this.health.height = block.height;
              } catch {}
            }
          }
        }
      } catch (e) {
        console.error('SSE failed:', e);
        setTimeout(() => this.streamBlocks(), 3000);
      }
    },

    start() {
      this.poll();
      setInterval(() => this.poll(), 5000);
      this.streamBlocks();
    }
  };
}
</script>
</body>
</html>
