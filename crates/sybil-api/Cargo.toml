[package]
name = "sybil-api"
version = "0.1.0"
edition = "2021"
description = "HTTP API for AI agent trading on Sybil prediction markets"

[[bin]]
name = "sybil-api"
path = "src/main.rs"

[dependencies]
matching-engine = { path = "../matching-engine" }
matching-sequencer = { path = "../matching-sequencer" }
sybil-oracle = { path = "../sybil-oracle" }
axum = { version = "0.8", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.6", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
utoipa = { version = "5", features = ["axum_extras"] }
hex = "0.4"
p256 = { version = "0.14.0-rc.6", features = ["ecdsa"] }
clap = { version = "4.5", features = ["derive", "env"] }
tokio-stream = { version = "0.1", features = ["sync"] }
