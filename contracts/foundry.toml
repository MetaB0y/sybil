[profile.default]
src = "src"
test = "test"
out = "out"
cache_path = "cache"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
verbosity = 2
fs_permissions = [{ access = "read", path = "../golden/golden-vectors.json" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
