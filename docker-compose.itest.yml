# SYB-243: isolated, throwaway sybil-api integration-test definition.
# The money-path harness combines it with docker-compose.yml. The store restore
# drill deliberately uses this file alone so globally named application
# volumes from the base file cannot enter its project or `down -v` cleanup.
services:
  sybil-api:
    # Test-scoped tag: never clobber ordinary local latest or an immutable
    # revision-tagged release image on the operator daemon.
    image: sybil-api:itest
    build:
      context: .
      args:
        CARGO_BUILD_JOBS: ${SYBIL_DOCKER_BUILD_JOBS:-4}
        CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${SYBIL_DOCKER_RELEASE_CODEGEN_UNITS:-16}
    ports:
      - "127.0.0.1:${SYBIL_ITEST_PORT:-3300}:3000"
    environment:
      SYBIL_DEPLOYMENT_PROFILE: "local"
      SYBIL_DEV_MODE: "true"
      SYBIL_BLOCK_INTERVAL_MS: "${SYBIL_ITEST_BLOCK_INTERVAL_MS:-1000}"
      SYBIL_DATA_DIR: "/itest-data"
      SYBIL_RETAIN_VALIDITY_ARTIFACTS: "${SYBIL_ITEST_RETAIN_VALIDITY_ARTIFACTS:-true}"
      SYBIL_ARENA_READ_URL: ""
      SYBIL_ARENA_READ_TOKEN: ""
      # The full money-path harness supplies a complete mock bridge domain.
      # Store restore drills also use this isolated overlay and must preserve a
      # source deployment whose bridge domain was deliberately unconfigured.
      SYBIL_BRIDGE_CHAIN_ID: "${SYBIL_BRIDGE_CHAIN_ID:-}"
      SYBIL_BRIDGE_VAULT_ADDRESS: "${SYBIL_BRIDGE_VAULT_ADDRESS:-}"
      SYBIL_BRIDGE_TOKEN_ADDRESS: "${SYBIL_BRIDGE_TOKEN_ADDRESS:-}"
      RUST_LOG: "warn,sybil_api=info,matching_sequencer=info"
    volumes:
      - itest-data:/itest-data
    restart: "no"

  sybil-history:
    image: sybil-api:itest
    restart: "no"

volumes:
  history-data:
    name: "${COMPOSE_PROJECT_NAME:-sybil-itest}-history-data"
  itest-data:
    name: "${COMPOSE_PROJECT_NAME:-sybil-itest}-data"
