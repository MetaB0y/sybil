# Production overrides: persistence, tuned params, Caddy.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  sybil-api:
    volumes:
      - sybil-data:/data
      - arena-data:/arena-data
    environment:
      # Selects the prod durability posture and arms the startup preflight
      # guardrail (SYB-133): sybil-api refuses to boot if any dev-only knob is
      # wired in. Override deliberately with SYBIL_ALLOW_DEV_KNOBS=1.
      # See docs/architecture/Deployment Profiles.md.
      SYBIL_DEPLOYMENT_PROFILE: "prod"
      SYBIL_DEV_MODE: "false"
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
      SYBIL_CORS_ORIGINS: "${SYBIL_CORS_ORIGINS:-}"
      # WebAuthn (passkey) relying-party config MUST equal the public web origin
      # the browser registers passkeys under. If these stay at the localhost
      # defaults, every assertion fails RpIdHashMismatch/OriginMismatch and ALL
      # passkey users are locked out (the default account-create mode is passkey).
      # RP_ID = the app host (no scheme); ORIGIN = scheme + host.
      SYBIL_WEBAUTHN_RP_ID: "${SYBIL_WEBAUTHN_RP_ID:?Set SYBIL_WEBAUTHN_RP_ID in /opt/sybil/.env (e.g. app.example.com)}"
      SYBIL_WEBAUTHN_ORIGIN: "${SYBIL_WEBAUTHN_ORIGIN:?Set SYBIL_WEBAUTHN_ORIGIN in /opt/sybil/.env (e.g. https://app.example.com)}"
      # Public devnet runs persistent by default. To intentionally reset,
      # stop sybil-api and remove or replace the sybil-data volume.
      SYBIL_DATA_DIR: "/data"
      SYBIL_ARENA_DB_PATH: "/arena-data/decisions.db"
      # Off-block Polymarket mirror metadata (event id/title, images, end
      # dates, category). JSON-on-disk so it survives sybil-api restarts.
      SYBIL_MARKET_REF_DATA_PATH: "/data/market_ref_data.json"
      # The API creates this P256 scalar on first boot and reloads the same
      # key on later boots. Keep it in sybil-data so the admin resolution feed
      # identity survives container replacement and host reboots.
      SYBIL_ADMIN_FEED_KEY_PATH: "/data/admin-feed.key"
      # Serve per-account equity series + history feed entirely from redb
      # (full series persisted under SYBIL_DATA_DIR). 0 = keep nothing in RAM,
      # so host memory no longer grows with the (ever-increasing) account count.
      SYBIL_MAX_EQUITY_POINTS_PER_ACCOUNT: "0"
      SYBIL_MAX_HISTORY_EVENTS_PER_ACCOUNT: "0"
      # Seven days at the inherited 10-second block cadence: 6 blocks/minute
      # * 60 * 24 * 7 = 60,480 blocks. Full blocks and their paired DA
      # artifact/manifest rows share the first floor; raw prices use the same
      # height window. Every supported candle resolution gets 604,800 seconds.
      # This does not prune account events, fills, or equity points.
      SYBIL_BLOCK_HISTORY_RETENTION_BLOCKS: "60480"
      SYBIL_RAW_PRICE_RETENTION_BLOCKS: "60480"
      # Run a bounded maintenance pass every ten minutes (60 blocks) so raw
      # price rows from the current market set do not accumulate behind the
      # target floor. One pass still deletes at most 10,000 rows.
      SYBIL_HISTORY_PRUNE_INTERVAL_BLOCKS: "60"
      SYBIL_HISTORY_PRUNE_MAX_ROWS: "10000"
      SYBIL_PRICE_CANDLE_RESOLUTIONS_SECS: "60,300,3600"
      SYBIL_PRICE_CANDLE_RETENTION_SECS: "604800,604800,604800"

    logging: *default-logging
  sybil-polymarket:
    environment:
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--max-events=50"
      - "--mirror-excluded-categories=sports"
      - "--mm-half-spread=0.01"
      - "--mm-budget-dollars=5000"
      - "--mm-initial-balance-dollars=1000000"
      - "--mm-max-markets=0"
      - "--mm-max-orders-per-block=64"
      - "--mapping-store-path=/data/polymarket_mapping.json"
      - "--sync-interval-secs=120"
      - "--curated-markets-path=/etc/sybil/curated_markets.json"
      - "--native-markets-path=/etc/sybil/native_markets.json"

    logging: *default-logging
  sybil-arena:
    volumes:
      - polymarket-data:/polymarket-data:ro
    env_file:
      - ./arena.env
    environment:
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--model=deepseek/deepseek-v4-flash"
      - "--db-path=/data/decisions.db"
      - "--mapping-path=/polymarket-data/polymarket_mapping.json"
      - "--metrics-port=9101"

    logging: *default-logging
  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in /opt/sybil/.env}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"

    logging: *default-logging
  sybil-web:
    # Frontend has no runtime env/volumes to override; keep prod logging parity.
    # NEXT_PUBLIC_* are baked at image build time (see docker-compose.yml build
    # args + frontend/web/Dockerfile). Set NEXT_PUBLIC_WEBAUTHN_RP_ID at build
    # time to the public web domain when passkeys are served off a subdomain.
    logging: *default-logging
  caddy:
    image: caddy:latest
    mem_limit: "128m"
    memswap_limit: "128m"
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_OPS_AUTH_USER: "${CADDY_OPS_AUTH_USER:?Set CADDY_OPS_AUTH_USER in /opt/sybil/.env}"
      CADDY_OPS_AUTH_HASH: "${CADDY_OPS_AUTH_HASH:?Set CADDY_OPS_AUTH_HASH in /opt/sybil/.env}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      sybil-api:
        condition: service_healthy
      sybil-web:
        condition: service_healthy
    restart: unless-stopped

    logging: *default-logging
volumes:
  sybil-data:
    name: sybil-data
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config
