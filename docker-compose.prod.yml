# Production overrides: persistence, tuned params, Caddy.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  sybil-api:
    volumes:
      - sybil-data:/data
      - arena-data:/arena-data
    environment:
      # Selects the prod durability posture and arms the startup preflight
      # guardrail (SYB-133): sybil-api refuses to boot if any dev-only knob is
      # wired in. Override deliberately with SYBIL_ALLOW_DEV_KNOBS=1.
      # See docs/architecture/Deployment Profiles.md.
      SYBIL_DEPLOYMENT_PROFILE: "prod"
      SYBIL_DEV_MODE: "false"
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
      SYBIL_CORS_ORIGINS: "${SYBIL_CORS_ORIGINS:-}"
      # A null Compose value omits the variable unless it is explicitly set in
      # the host environment or .env. Passing an empty string is not equivalent:
      # clap treats it as an invalid CIDR. Configure only the exact audited
      # Caddy-facing Docker CIDR; never use a broad private-address range.
      SYBIL_HTTP_TRUSTED_PROXY_CIDRS:
      # WebAuthn policy MUST equal the RP/origin compiled into the validity
      # guest. A mismatch fails the prod preflight; changing hostnames requires
      # a guest repin and fresh genesis. RP_ID has no scheme; ORIGIN does.
      SYBIL_WEBAUTHN_RP_ID: "${SYBIL_WEBAUTHN_RP_ID:?Set the guest-pinned RP ID in /opt/sybil/.env}"
      SYBIL_WEBAUTHN_ORIGIN: "${SYBIL_WEBAUTHN_ORIGIN:?Set the guest-pinned origin in /opt/sybil/.env}"
      # Public devnet runs persistent by default. To intentionally reset,
      # stop sybil-api and remove or replace the sybil-data volume.
      SYBIL_DATA_DIR: "/data"
      SYBIL_ARENA_DB_PATH: "/arena-data/decisions.db"
      SYBIL_HISTORY_URL: "http://sybil-history:3003"
      SYBIL_HISTORY_TOKEN: "${SYBIL_HISTORY_TOKEN:?Set SYBIL_HISTORY_TOKEN in /opt/sybil/.env}"
      # Off-block Polymarket mirror metadata (event id/title, images, end
      # dates, category). JSON-on-disk so it survives sybil-api restarts.
      SYBIL_MARKET_REF_DATA_PATH: "/data/market_ref_data.json"
      # The API creates this P256 scalar on first boot and reloads the same
      # key on later boots. Keep it in sybil-data so the admin resolution feed
      # identity survives container replacement and host reboots.
      SYBIL_ADMIN_FEED_KEY_PATH: "/data/admin-feed.key"
      # History serving lives in sybil-history; these only bound optional hot
      # analytics caches in the sequencer process.
      SYBIL_MAX_RECENT_EQUITY_POINTS_PER_ACCOUNT: "0"
      SYBIL_MAX_RECENT_ACCOUNT_EVENTS_PER_ACCOUNT: "0"
      # Seven days at the inherited 10-second block cadence: 6 blocks/minute
      # * 60 * 24 * 7 = 60,480 blocks. This applies only to full canonical
      # blocks and paired local DA artifacts, not product history.
      SYBIL_CANONICAL_ARCHIVE_RETENTION_BLOCKS: "${SYBIL_CANONICAL_ARCHIVE_RETENTION_BLOCKS:-60480}"
      # Exact-byte acknowledgement transfers durable job ownership to the
      # standalone prover. Keep a bounded sequencer-side safety window after
      # that handoff; unacknowledged jobs are never eligible for deletion.
      SYBIL_ACKNOWLEDGED_PROOF_JOB_RETENTION_BLOCKS: "${SYBIL_ACKNOWLEDGED_PROOF_JOB_RETENTION_BLOCKS:-60480}"
      # Run canonical block/DA maintenance every ten minutes (60 blocks).
      SYBIL_CANONICAL_ARCHIVE_MAINTENANCE_INTERVAL_BLOCKS: "60"
      SYBIL_CANONICAL_ARCHIVE_MAX_ROWS_PER_PASS: "10000"

    logging: *default-logging
  sybil-history:
    environment:
      SYBIL_HISTORY_DEV_MODE: "false"
      SYBIL_HISTORY_TOKEN: "${SYBIL_HISTORY_TOKEN:?Set SYBIL_HISTORY_TOKEN in /opt/sybil/.env}"
      SYBIL_HISTORY_DATA_DIR: "/history-data"
      SYBIL_HISTORY_CANDLE_RESOLUTIONS_SECS: "60,300,3600"
    logging: *default-logging
  sybil-l1-indexer:
    environment:
      SYBIL_L1_RPC_URL: "${SYBIL_L1_RPC_URL:-}"
      SYBIL_L1_VAULT: "${SYBIL_L1_VAULT:-}"
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
      SYBIL_L1_CONFIRMATIONS: "${SYBIL_L1_CONFIRMATIONS:-64}"
      SYBIL_L1_MIN_CONFIRMATIONS: "${SYBIL_L1_MIN_CONFIRMATIONS:-64}"
    logging: *default-logging
  sybil-polymarket:
    environment:
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--max-events=50"
      - "--mirror-excluded-categories=sports"
      - "--mm-half-spread=0.01"
      - "--mm-budget-dollars=5000"
      - "--mm-initial-balance-dollars=1000000"
      - "--mm-max-markets=0"
      - "--mm-max-orders-per-block=64"
      - "--mapping-store-path=/data/polymarket_mapping.json"
      - "--sync-interval-secs=120"
      - "--curated-markets-path=/etc/sybil/curated_markets.json"
      - "--native-markets-path=/etc/sybil/native_markets.json"

    logging: *default-logging
  sybil-arena:
    volumes:
      - polymarket-data:/polymarket-data:ro
    env_file:
      - ./arena.env
    environment:
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--model=deepseek/deepseek-v4-flash"
      - "--db-path=/data/decisions.db"
      - "--mapping-path=/polymarket-data/polymarket_mapping.json"
      - "--metrics-port=9101"
      # Keep the live bot cohort aligned with the deliberately small curated
      # mirror. This also prevents pre-reset legacy mirror rows from silently
      # returning to Arena after an opt-in experiment is retired.
      - "--market-profile=important-news"
      - "--max-markets=12"
      - "--require-reference-prices"

    logging: *default-logging
  sybil-arena-dashboard:
    environment:
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:?Set SYBIL_SERVICE_TOKEN in /opt/sybil/.env}"
  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in /opt/sybil/.env}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"

    logging: *default-logging
  sybil-web:
    # Frontend has no runtime env/volumes to override; keep prod logging parity.
    # NEXT_PUBLIC_* are baked at image build time (see docker-compose.yml build
    # args + frontend/web/Dockerfile). Set NEXT_PUBLIC_WEBAUTHN_RP_ID at build
    # time to the public web domain when passkeys are served off a subdomain.
    logging: *default-logging
  caddy:
    image: caddy:latest
    mem_limit: "128m"
    memswap_limit: "128m"
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_OPS_AUTH_USER: "${CADDY_OPS_AUTH_USER:?Set CADDY_OPS_AUTH_USER in /opt/sybil/.env}"
      CADDY_OPS_AUTH_HASH: "${CADDY_OPS_AUTH_HASH:?Set CADDY_OPS_AUTH_HASH in /opt/sybil/.env}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      sybil-api:
        condition: service_healthy
      sybil-web:
        condition: service_healthy
    restart: unless-stopped

    logging: *default-logging
volumes:
  sybil-data:
    name: sybil-data
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config
