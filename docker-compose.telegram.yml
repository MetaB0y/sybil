# Optional Telegram alerting overlay.
# Usage:
#   1. Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in /opt/sybil/.env.
#   2. docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#        -f docker-compose.telegram.yml --profile ops up -d telegram-alerts vmalert
services:
  telegram-alerts:
    profiles: ["ops"]
    image: python:3.13-alpine
    mem_limit: "64m"
    memswap_limit: "64m"
    command: ["python", "/app/telegram-alerts.py"]
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      TELEGRAM_ALERT_PREFIX: "Sybil"
      TELEGRAM_ALERT_REPEAT_SECONDS: "1800"
    volumes:
      - ./deploy/telegram-alerts.py:/app/telegram-alerts.py:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  vmalert:
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-remoteWrite.url=http://victoriametrics:8428"
      - "-remoteRead.url=http://victoriametrics:8428"
      - "-rule=/etc/alerts/rules.yml"
      - "-rule=/etc/alerts/block-production.yml"
      - "-notifier.url=http://telegram-alerts:8080"
      # PagerDuty-lite / generic webhook slot: uncomment and point at any
      # Alertmanager-v2 webhook receiver (vmalert fans out to every -notifier.url).
      # - "-notifier.url=${ALERT_WEBHOOK_URL}"
      - "-httpListenAddr=:8880"
    depends_on:
      victoriametrics:
        condition: service_healthy
      telegram-alerts:
        condition: service_started
