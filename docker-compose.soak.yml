# Opt-in laptop-only Actor Liquidity soak profile.
#
# Always invoke through `just local-soak-*`. The wrapper fixes a dedicated
# Compose project, generates local-only actor credentials, checks that Docker
# is local, and never loads docker-compose.prod.yml.

services:
  sybil-api:
    environment:
      SYBIL_DEPLOYMENT_PROFILE: "local"
      SYBIL_DEV_MODE: "true"
      SYBIL_ACTOR_CREDENTIALS_PATH: "/run/secrets/sybil-soak-actors.json"
      SYBIL_WEBAUTHN_RP_ID: "localhost"
      SYBIL_WEBAUTHN_ORIGIN: "http://localhost:${SYBIL_LOCAL_WEB_PORT:-3105}"
    volumes:
      - ./.sybil-soak/actor-credentials.json:/run/secrets/sybil-soak-actors.json:ro

  # Multi-hour actor runs generate dense prices/fills for every market. The
  # base 256 MiB history limit is too small once the redb file and its mapped
  # pages grow, and can leave the service in an OOM restart loop. This override
  # is laptop-soak-only; the wrapper never loads the production overlay.
  sybil-history:
    mem_limit: "1536m"
    memswap_limit: "2048m"

  sybil-soak-bootstrap:
    image: sybil-api:latest
    entrypoint: ["/bin/sh", "/opt/sybil/local-soak-bootstrap.sh"]
    environment:
      SYBIL_SOAK_API_BASE: "http://sybil-api:3000"
    volumes:
      - ./scripts/local-soak-bootstrap.sh:/opt/sybil/local-soak-bootstrap.sh:ro
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: "no"

  sybil-polymarket:
    environment:
      SYBIL_MM_ACTOR_TOKEN: "${SYBIL_SOAK_MM_TOKEN:-local-soak-mm-token-missing}"
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--max-events=50"
      - "--mirror-excluded-categories=sports"
      - "--mm-half-spread=0.01"
      - "--mm-budget-dollars=5000"
      - "--mm-quote-size-dollars=200"
      - "--mm-initial-balance-dollars=5000000"
      - "--mm-max-position=20000"
      - "--mm-max-markets=0"
      - "--mm-max-orders-per-block=0"
      - "--mm-complete-set-target-shares=20000"
      - "--mapping-store-path=/data/polymarket_mapping.json"
      - "--sync-interval-secs=120"
      - "--curated-markets-path=/etc/sybil/curated_markets.json"
      - "--native-markets-path=/etc/sybil/native_markets.json"
    depends_on:
      sybil-api:
        condition: service_healthy
      sybil-soak-bootstrap:
        condition: service_completed_successfully

  sybil-arena:
    environment:
      SYBIL_NOISE_ACTORS_JSON: "/run/secrets/sybil-soak-actors.json"
      ARENA_NOISE_MIN_ORDER_DOLLARS: "7"
      ARENA_NOISE_MAX_ORDER_DOLLARS: "150"
      ARENA_NOISE_INVENTORY_BIAS_DOLLARS: "800"
      ARENA_NOISE_STATE_PATH: "/data/noise-state.json"
    volumes:
      - polymarket-data:/polymarket-data:ro
      - ./.sybil-soak/actor-credentials.json:/run/secrets/sybil-soak-actors.json:ro
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--model=deepseek/deepseek-v4-flash"
      - "--db-path=/data/decisions.db"
      - "--mapping-path=/polymarket-data/polymarket_mapping.json"
      - "--metrics-port=9101"
      - "--market-profile=important-news"
      - "--max-markets=12"
      - "--require-reference-prices"
    depends_on:
      sybil-api:
        condition: service_healthy
      sybil-soak-bootstrap:
        condition: service_completed_successfully
      sybil-polymarket:
        condition: service_started

  sybil-web:
    build:
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:${SYBIL_LOCAL_API_PORT:-3100}"
        NEXT_PUBLIC_WS_BASE: "ws://localhost:${SYBIL_LOCAL_API_PORT:-3100}"
        NEXT_PUBLIC_WEBAUTHN_RP_ID: "localhost"
    depends_on:
      sybil-api:
        condition: service_healthy

volumes:
  sybil-data:
    name: sybil-local-soak-data
  history-data:
    name: sybil-local-soak-history
  polymarket-data:
    name: sybil-local-soak-polymarket
  arena-data:
    name: sybil-local-soak-arena
  vmdata:
    name: sybil-local-soak-metrics
  prover-jobs:
    name: sybil-local-soak-prover-jobs
  prover-artifacts:
    name: sybil-local-soak-prover-artifacts
