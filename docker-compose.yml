services:
  sybil-api:
    image: sybil-api:latest
    ports:
      - "3000:3000"
    environment:
      SYBIL_PORT: "3000"
      SYBIL_DEV_MODE: "true"
      SYBIL_BLOCK_INTERVAL_MS: "2000"
      SYBIL_ARENA_DB_PATH: "/arena-data/decisions.db"
      RUST_LOG: "info"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
    volumes:
      - arena-data:/arena-data
    restart: unless-stopped
    stop_grace_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  sybil-polymarket:
    image: sybil-api:latest
    entrypoint: ["sybil-polymarket"]
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--max-events=20"
      - "--mm-half-spread=0.02"
      - "--mm-budget-dollars=5000"
      - "--mm-initial-balance-dollars=1000000"
      - "--mapping-store-path=/data/polymarket_mapping.json"
    environment:
      RUST_LOG: "sybil_polymarket=info"
    volumes:
      - polymarket-data:/data
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped

  sybil-arena:
    image: sybil-arena:latest
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--api-key=${OPENROUTER_API_KEY}"
      - "--max-markets=20"
      - "--model=deepseek/deepseek-v4-flash"
      - "--db-path=/data/decisions.db"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - arena-data:/data
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped

  sybil-arena-dashboard:
    image: sybil-arena:latest
    entrypoint: ["uv", "run", "streamlit", "run", "live/dashboard.py"]
    command:
      - "--server.port=8501"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8501:8501"
    volumes:
      - arena-data:/data
    depends_on:
      - sybil-arena
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "-storageDataPath=/storage"
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=30d"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5

  vmalert:
    image: victoriametrics/vmalert:v1.101.0
    ports:
      - "8880:8880"
    volumes:
      - ./deploy/vmalert:/etc/alerts:ro
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-remoteWrite.url=http://victoriametrics:8428"
      - "-remoteRead.url=http://victoriametrics:8428"
      - "-rule=/etc/alerts/rules.yml"
      - "-notifier.blackhole"
      - "-httpListenAddr=:8880"
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8880/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.1
    ports:
      - "4317:4317"
      - "3200:3200"
    volumes:
      - ./deploy/tempo.yml:/etc/tempo.yml:ro
      - tempodata:/var/tempo
    command:
      - "-config.file=/etc/tempo.yml"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vmdata:
    name: vmdata
  tempodata:
    name: tempo-data
  polymarket-data:
    name: polymarket-data
  arena-data:
    name: arena-data
