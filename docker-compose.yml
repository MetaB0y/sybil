services:
  sybil-api:
    image: sybil-api:latest
    mem_limit: "900m"
    memswap_limit: "900m"
    environment:
      SYBIL_PORT: "3000"
      SYBIL_DEV_MODE: "true"
      SYBIL_BLOCK_INTERVAL_MS: "10000"
      SYBIL_ARENA_DB_PATH: "/arena-data/decisions.db"
      SYBIL_MAX_PRICE_HISTORY_POINTS_PER_MARKET: "2000"
      SYBIL_MAX_FILL_HISTORY_PER_ACCOUNT: "5000"
      SYBIL_EVENT_SNAPSHOT_DIR: "/data/event_snapshots"
      RUST_LOG: "warn,sybil_api=info,matching_sequencer=info,sybil_prover=info,commonware_storage=error,tower_http=warn"
    volumes:
      - arena-data:/arena-data
    restart: unless-stopped
    stop_grace_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  sybil-polymarket:
    image: sybil-api:latest
    mem_limit: "256m"
    memswap_limit: "256m"
    entrypoint: ["sybil-polymarket"]
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--max-events=20"
      - "--mirror-excluded-categories=sports"
      - "--mm-half-spread=0.02"
      - "--mm-budget-dollars=5000"
      - "--mm-initial-balance-dollars=1000000"
      - "--mm-max-markets=0"
      - "--mm-max-orders-per-block=64"
      - "--mapping-store-path=/data/polymarket_mapping.json"
    environment:
      RUST_LOG: "sybil_polymarket=info"
    volumes:
      - polymarket-data:/data
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped

  sybil-prover:
    image: sybil-api:latest
    mem_limit: "256m"
    memswap_limit: "256m"
    entrypoint: ["sybil-prover"]
    command:
      - "serve"
      - "--artifacts-dir=/artifacts"
      - "--jobs-dir=/jobs"
      - "--bind=0.0.0.0:3002"
    volumes:
      - prover-jobs:/jobs
      - prover-artifacts:/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  sybil-prover-worker:
    image: sybil-api:latest
    profiles: ["prover-worker"]
    mem_limit: "256m"
    memswap_limit: "256m"
    entrypoint: ["sybil-prover"]
    command:
      - "worker"
      - "--jobs-dir=/jobs"
      - "--artifacts-dir=/artifacts"
      - "--poll-ms=1000"
    volumes:
      - prover-jobs:/jobs
      - prover-artifacts:/artifacts
    restart: unless-stopped

  sybil-prover-mock:
    image: sybil-api:latest
    mem_limit: "128m"
    memswap_limit: "128m"
    entrypoint: ["sybil-prover"]
    command:
      - "mock-live"
      - "--sybil-url=http://sybil-api:3000"
      - "--artifacts-dir=/artifacts"
      - "--poll-ms=2000"
      - "--max-artifacts=1000"
    volumes:
      - prover-artifacts:/artifacts
    depends_on:
      sybil-api:
        condition: service_healthy
      sybil-prover:
        condition: service_started
    restart: unless-stopped

  sybil-arena:
    image: sybil-arena:latest
    mem_limit: "512m"
    memswap_limit: "512m"
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--model=deepseek/deepseek-v4-flash"
      - "--db-path=/data/decisions.db"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - arena-data:/data
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped

  sybil-arena-dashboard:
    image: sybil-arena:latest
    mem_limit: "512m"
    memswap_limit: "512m"
    entrypoint: ["uv", "run", "streamlit", "run", "live/dashboard.py"]
    command:
      - "--server.port=8501"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - arena-data:/data
    depends_on:
      - sybil-arena
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    mem_limit: "256m"
    memswap_limit: "256m"
    volumes:
      - vmdata:/storage
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "-storageDataPath=/storage"
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=7d"
      - "-memory.allowedBytes=128MiB"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  vmalert:
    image: victoriametrics/vmalert:v1.101.0
    mem_limit: "128m"
    memswap_limit: "128m"
    volumes:
      - ./deploy/vmalert:/etc/alerts:ro
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-remoteWrite.url=http://victoriametrics:8428"
      - "-remoteRead.url=http://victoriametrics:8428"
      - "-rule=/etc/alerts/rules.yml"
      - "-notifier.blackhole"
      - "-httpListenAddr=:8880"
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8880/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    mem_limit: "256m"
    memswap_limit: "256m"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:-sybil-dev}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.1
    mem_limit: "128m"
    memswap_limit: "128m"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/docker/.+|var/lib/docker/.+)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    restart: unless-stopped

volumes:
  vmdata:
    name: vmdata
  polymarket-data:
    name: polymarket-data
  arena-data:
    name: arena-data
  prover-jobs:
    name: prover-jobs
  prover-artifacts:
    name: prover-artifacts
