x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  sybil-api:
    image: sybil-api:latest
    # Cold-start restore replays the full durable log to rebuild in-memory
    # sequencer state; its transient peak exceeds steady-state RSS. At 900m with
    # memswap==mem (swap denied) a mature chain OOM-loops on boot and can never
    # restart. Give headroom + a swap cushion for the restore peak. Real fix is
    # bounded-memory restore (state snapshot + log truncation) — see SYB-266.
    mem_limit: "1280m"
    memswap_limit: "1600m"
    environment:
      SYBIL_PORT: "3000"
      SYBIL_DEPLOYMENT_PROFILE: "${SYBIL_DEPLOYMENT_PROFILE:-devnet}"
      SYBIL_DEV_MODE: "true"
      SYBIL_BLOCK_INTERVAL_MS: "10000"
      # The mirror rejects a token after 30s without a tick; the API adds an
      # independent 60s per-market fail-closed ceiling if the publisher dies.
      SYBIL_REFERENCE_PRICE_TTL_MS: "${SYBIL_REFERENCE_PRICE_TTL_MS:-60000}"
      SYBIL_ARENA_DB_PATH: "/arena-data/decisions.db"
      SYBIL_HISTORY_URL: "http://sybil-history:3003"
      SYBIL_HISTORY_TOKEN: "${SYBIL_HISTORY_TOKEN:-sybil-history-dev-only}"
      SYBIL_DATA_DIR: "/data"
      # All three are optional as a group. When absent, monetary bridge routes
      # fail closed while trading and bridge status remain available.
      SYBIL_BRIDGE_CHAIN_ID: "${SYBIL_BRIDGE_CHAIN_ID:-}"
      SYBIL_BRIDGE_VAULT_ADDRESS: "${SYBIL_BRIDGE_VAULT_ADDRESS:-}"
      SYBIL_BRIDGE_TOKEN_ADDRESS: "${SYBIL_BRIDGE_TOKEN_ADDRESS:-}"
      # The local Compose frontend is published on localhost:3005. Keep the
      # browser ceremony and server verification on the same RP/origin by
      # default, while allowing production/alternate local hosts to override.
      SYBIL_WEBAUTHN_RP_ID: "${SYBIL_WEBAUTHN_RP_ID:-localhost}"
      SYBIL_WEBAUTHN_ORIGIN: "${SYBIL_WEBAUTHN_ORIGIN:-http://localhost:3005}"
      # Anonymous onboarding receives one server-selected play-money grant and
      # can consume at most this many lifetime account ids. Account ids are not
      # reclaimed; service-authenticated bot/operator creation is separate.
      SYBIL_PUBLIC_ACCOUNT_CAPACITY: "${SYBIL_PUBLIC_ACCOUNT_CAPACITY:-1000}"
      SYBIL_PUBLIC_ACCOUNT_GRANT_NANOS: "${SYBIL_PUBLIC_ACCOUNT_GRANT_NANOS:-1000000000000}"
      SYBIL_HTTP_ONBOARDING_GLOBAL_RPS: "5"
      SYBIL_HTTP_ONBOARDING_GLOBAL_BURST: "20"
      SYBIL_HTTP_ONBOARDING_CLIENT_RPS: "1"
      SYBIL_HTTP_ONBOARDING_CLIENT_BURST: "3"
      # The shared mock-prover devnet transfers durable ownership quickly; keep
      # one day of acknowledged source jobs as a bounded recovery cushion.
      # Direct cargo runs retain the conservative no-prune default.
      SYBIL_ACKNOWLEDGED_PROOF_JOB_RETENTION_BLOCKS: "${SYBIL_ACKNOWLEDGED_PROOF_JOB_RETENTION_BLOCKS:-8640}"
      SYBIL_ACKNOWLEDGED_PROOF_JOB_MAINTENANCE_INTERVAL_BLOCKS: "60"
      SYBIL_ACKNOWLEDGED_PROOF_JOB_MAX_ROWS_PER_PASS: "1000"
      SYBIL_EVENT_SNAPSHOT_DIR: "/data/event_snapshots"
      RUST_LOG: "warn,sybil_api=info,matching_sequencer=info,sybil_prover=info,commonware_storage=error,tower_http=warn"
    volumes:
      - sybil-data:/data
      - arena-data:/arena-data
    restart: unless-stopped
    stop_grace_period: 10s
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  sybil-history:
    image: sybil-api:latest
    mem_limit: "256m"
    memswap_limit: "384m"
    entrypoint: ["sybil-history"]
    environment:
      SYBIL_HISTORY_BIND: "0.0.0.0:3003"
      SYBIL_HISTORY_DATA_DIR: "/history-data"
      SYBIL_HISTORY_DEV_MODE: "false"
      SYBIL_HISTORY_TOKEN: "${SYBIL_HISTORY_TOKEN:-sybil-history-dev-only}"
      SYBIL_HISTORY_CANDLE_RESOLUTIONS_SECS: "60,300,3600"
      SYBIL_HISTORY_MAX_QUERY_CONCURRENCY: "16"
      RUST_LOG: "warn,sybil_history=info"
    volumes:
      - history-data:/history-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    logging: *default-logging

  # Opt-in until an L1 deployment is configured. Enable with
  # `docker compose --profile l1-indexer up -d sybil-l1-indexer`; its cursor
  # volume is deployment identity and must never be shared across vaults.
  sybil-l1-indexer:
    profiles: ["l1-indexer"]
    image: sybil-api:latest
    mem_limit: "256m"
    memswap_limit: "384m"
    entrypoint: ["sybil-l1-indexer"]
    environment:
      SYBIL_L1_RPC_URLS: "${SYBIL_L1_RPC_URLS:-http://host.docker.internal:8545}"
      SYBIL_L1_RPC_IDS: "${SYBIL_L1_RPC_IDS:-local-anvil}"
      SYBIL_L1_TRUST_MODE: "${SYBIL_L1_TRUST_MODE:-unsafe-single-dev}"
      SYBIL_API_URL: "http://sybil-api:3000"
      SYBIL_SERVICE_TOKEN: "${SYBIL_SERVICE_TOKEN:-sybil-local-service}"
      SYBIL_L1_VAULT: "${SYBIL_L1_VAULT:-}"
      SYBIL_L1_CHAIN_ID: "${SYBIL_L1_CHAIN_ID:-31337}"
      SYBIL_L1_START_BLOCK: "${SYBIL_L1_START_BLOCK:-0}"
      SYBIL_L1_CONFIRMATIONS: "${SYBIL_L1_CONFIRMATIONS:-2}"
      SYBIL_L1_MIN_CONFIRMATIONS: "${SYBIL_L1_MIN_CONFIRMATIONS:-2}"
      SYBIL_L1_CURSOR_PATH: "/l1-indexer-data/cursor.json"
      SYBIL_L1_METRICS_BIND: "0.0.0.0:9102"
      RUST_LOG: "warn,sybil_l1_indexer=info"
    volumes:
      - l1-indexer-data:/l1-indexer-data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9102/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging: *default-logging

  sybil-web:
    # Next.js frontend (standalone server, non-root). NEXT_PUBLIC_* are baked at
    # BUILD time, so the API/WS base URLs are build args, not runtime env.
    image: sybil-web:latest
    build:
      context: ./frontend/web
      args:
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE:-https://172-104-31-54.nip.io}"
        NEXT_PUBLIC_WS_BASE: "${NEXT_PUBLIC_WS_BASE:-wss://172-104-31-54.nip.io}"
        NEXT_PUBLIC_WEBAUTHN_RP_ID: "${NEXT_PUBLIC_WEBAUTHN_RP_ID:-}"
    mem_limit: "256m"
    memswap_limit: "256m"
    restart: unless-stopped
    healthcheck:
      # node:slim ships no curl/wget; use Node's global fetch instead.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    logging: *default-logging
  sybil-polymarket:
    image: sybil-api:latest
    mem_limit: "256m"
    memswap_limit: "256m"
    entrypoint: ["sybil-polymarket"]
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--max-events=20"
      - "--mirror-excluded-categories=sports"
      - "--mm-half-spread=0.02"
      - "--mm-budget-dollars=5000"
      - "--mm-initial-balance-dollars=1000000"
      - "--mm-max-markets=0"
      - "--mm-max-orders-per-block=64"
      - "--mapping-store-path=/data/polymarket_mapping.json"
      - "--curated-markets-path=/etc/sybil/curated_markets.json"
      - "--native-markets-path=/etc/sybil/native_markets.json"
    environment:
      RUST_LOG: "sybil_polymarket=info"
    volumes:
      - polymarket-data:/data
      - ./crates/sybil-polymarket/curated_markets.json:/etc/sybil/curated_markets.json:ro
      - ./crates/sybil-polymarket/native_markets.json:/etc/sybil/native_markets.json:ro
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped

    logging: *default-logging
  sybil-prover:
    image: sybil-api:latest
    mem_limit: "256m"
    memswap_limit: "256m"
    entrypoint: ["sybil-prover"]
    command:
      - "daemon"
      - "--db=/data/prover.redb"
      - "--artifacts-dir=/artifacts"
      - "--bind=0.0.0.0:3002"
      - "--guest-pins=/etc/sybil/sybil-openvm-guest.commit.json"
    environment:
      # Base Compose is a cheap integration soak. Real STARK proving runs on a
      # prover host with the pinned OpenVM toolchain; see the prover runbook.
      SYBIL_PROVER_PROOF_KIND: "${SYBIL_PROVER_PROOF_KIND:-mock}"
      SYBIL_PROVER_EPOCH_BLOCKS: "${SYBIL_PROVER_EPOCH_BLOCKS:-4}"
      SYBIL_PROVER_AUTH_TOKEN: "${SYBIL_PROVER_AUTH_TOKEN:-sybil-local-prover}"
      SYBIL_PROVER_SOURCE_URL: "http://sybil-api:3000"
      SYBIL_PROVER_SOURCE_TOKEN: "${SYBIL_SERVICE_TOKEN:-sybil-local-service}"
    volumes:
      - prover-data:/data
      - prover-artifacts:/artifacts
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5

    logging: *default-logging
  sybil-arena:
    image: sybil-arena:latest
    mem_limit: "512m"
    memswap_limit: "512m"
    command:
      - "--sybil-url=http://sybil-api:3000"
      - "--model=deepseek/deepseek-v4-flash"
      - "--db-path=/data/decisions.db"
      - "--metrics-port=9101"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - arena-data:/data
    depends_on:
      sybil-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9101/metrics"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

    logging: *default-logging
  sybil-arena-dashboard:
    image: sybil-arena:latest
    mem_limit: "512m"
    memswap_limit: "512m"
    entrypoint: ["uv", "run", "--no-sync", "streamlit", "run", "live/dashboard.py"]
    command:
      - "--server.port=8501"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - arena-data:/data
    depends_on:
      sybil-arena:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/_stcore/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

    logging: *default-logging
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    mem_limit: "256m"
    memswap_limit: "256m"
    volumes:
      - vmdata:/storage
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "-storageDataPath=/storage"
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=7d"
      - "-memory.allowedBytes=128MiB"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

    logging: *default-logging
  vmalert:
    image: victoriametrics/vmalert:v1.101.0
    mem_limit: "128m"
    memswap_limit: "128m"
    volumes:
      - ./deploy/vmalert:/etc/alerts:ro
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-remoteWrite.url=http://victoriametrics:8428"
      - "-remoteRead.url=http://victoriametrics:8428"
      - "-rule=/etc/alerts/rules.yml"
      - "-rule=/etc/alerts/block-production.yml"
      - "-notifier.blackhole"
      - "-httpListenAddr=:8880"
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8880/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

    logging: *default-logging
  grafana:
    image: grafana/grafana:11.0.0
    mem_limit: "256m"
    memswap_limit: "256m"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:-sybil-dev}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

    logging: *default-logging
  node-exporter:
    image: prom/node-exporter:v1.8.1
    mem_limit: "128m"
    memswap_limit: "128m"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/docker/.+|var/lib/docker/.+)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    restart: unless-stopped

    logging: *default-logging
volumes:
  sybil-data:
    name: sybil-data
  vmdata:
    name: vmdata
  polymarket-data:
    name: polymarket-data
  arena-data:
    name: arena-data
  prover-data:
    name: prover-data
  prover-artifacts:
    name: prover-artifacts
  history-data:
    name: history-data
  l1-indexer-data:
    name: l1-indexer-data
