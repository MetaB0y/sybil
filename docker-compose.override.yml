# Local dev: adds build contexts so `docker compose build` works.
# Auto-loaded by `docker compose up` — not shipped to server.
x-rust-build-args: &rust-build-args
  CARGO_BUILD_JOBS: ${SYBIL_DOCKER_BUILD_JOBS:-4}
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${SYBIL_DOCKER_RELEASE_CODEGEN_UNITS:-16}

services:
  sybil-api:
    build:
      context: .
      args: *rust-build-args
    ports:
      - "127.0.0.1:3000:3000"

  sybil-polymarket:
    build:
      context: .
      args: *rust-build-args

  sybil-arena:
    build: ./arena
    environment:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"

  sybil-arena-dashboard:
    build: ./arena
    ports:
      - "127.0.0.1:8501:8501"

  sybil-prover:
    ports:
      - "127.0.0.1:3002:3002"

  victoriametrics:
    ports:
      - "127.0.0.1:8428:8428"

  vmalert:
    ports:
      - "127.0.0.1:8880:8880"

  grafana:
    ports:
      - "127.0.0.1:3001:3000"
