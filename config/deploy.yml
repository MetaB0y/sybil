# Kamal 2 deployment configuration for Sybil API
#
# First time:  kamal setup       (provisions server, starts accessories)
# Deploy:      kamal deploy      (builds image, zero-downtime deploy)
# Accessories: kamal accessory boot --all
#
# Required env vars (set in .kamal/secrets):
#   DEPLOY_HOST, DEPLOY_DOMAIN
#   KAMAL_REGISTRY_USERNAME, KAMAL_REGISTRY_PASSWORD

service: sybil

image: sybil-api

servers:
  web:
    hosts:
      - 172.104.31.54

proxy:
  ssl: true
  host: 172.104.31.54
  healthcheck:
    path: /v1/health
    interval: 5

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  remote: ssh://root@172.104.31.54
  arch: amd64
  context: .

env:
  clear:
    SYBIL_PORT: "3000"
    SYBIL_DEV_MODE: "true"
    SYBIL_BLOCK_INTERVAL_MS: "2000"
    RUST_LOG: "info"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://sybil-tempo:4317"
  secret:
    - SYBIL_SEED_MARKETS

accessories:
  polymarket:
    image: ghcr.io/metab0y/sybil-api:latest
    host: 172.104.31.54
    cmd: >
      sybil-polymarket
      --sybil-url http://host.docker.internal:3000
      --max-events 50
      --mm-half-spread 0.02
      --mm-budget-dollars 5000
      --mm-initial-balance-dollars 1000000
      --sync-interval-secs 120
      --mapping-store-path /data/polymarket_mapping.json
    env:
      clear:
        RUST_LOG: "sybil_polymarket=info"
    volumes:
      - polymarket-data:/data

  arena:
    image: ghcr.io/metab0y/sybil-arena:latest
    host: 172.104.31.54
    cmd: >
      --sybil-url http://host.docker.internal:3000
      --api-key ${OPENROUTER_API_KEY}
      --max-markets 20
      --model minimax/minimax-m2.7
      --db-path /data/decisions.db
    env:
      clear:
        PYTHONUNBUFFERED: "1"
      secret:
        - OPENROUTER_API_KEY
    volumes:
      - arena-data:/data

  arena-dashboard:
    image: ghcr.io/metab0y/sybil-arena:latest
    host: 172.104.31.54
    port: "8501:8501"
    cmd: >
      uv run streamlit run live/dashboard.py
      --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    env:
      clear:
        PYTHONUNBUFFERED: "1"
    volumes:
      - arena-data:/data

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    host: 172.104.31.54
    port: "8428:8428"
    volumes:
      - vmdata:/storage
    files:
      - deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    cmd: >
      -storageDataPath=/storage
      -promscrape.config=/etc/prometheus/prometheus.yml
      -retentionPeriod=30d

  tempo:
    image: grafana/tempo:2.4.1
    host: 172.104.31.54
    port: "4317:4317"
    volumes:
      - tempodata:/var/tempo
    files:
      - deploy/tempo.yml:/etc/tempo.yml
    cmd: "-config.file=/etc/tempo.yml"

  grafana:
    image: grafana/grafana:11.0.0
    host: 172.104.31.54
    port: "3001:3000"
    env:
      clear:
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    directories:
      - deploy/grafana/provisioning:/etc/grafana/provisioning
      - deploy/grafana/dashboards:/var/lib/grafana/dashboards
