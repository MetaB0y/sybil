<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sybil — All Markets</title>
<link rel="icon" href="../assets/favicon.ico">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  html, body { background: var(--bg-1); margin: 0; height: 100%; }
  body { color: var(--fg-1); font-family: var(--font-sans); }
  .page { min-height: 100vh; display: flex; flex-direction: column; }
  .scroll { flex: 1; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 16px 24px 32px; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
  /* Card skeleton: rigid grid so all cards align row-for-row */
  .ev-card {
    background: var(--surface-1);
    border: 1px solid var(--border-1);
    border-radius: 6px;
    padding: 16px;
    display: grid;
    grid-template-rows: 22px 56px auto 1fr 18px;  /* meta, title block, featured, outcome rows, footer */
    gap: 12px;
    height: 360px;
    box-sizing: border-box;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../data/MarketsData.jsx"></script>
<script type="text/babel" src="../data/EventsDataV3.jsx"></script>

<script type="text/babel">
function fmtNum(n) { if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'K'; return ''+n; }

// ── Live batch clock ─────────────────────────────────────────────────────
function useBatchClock() {
  const [secs, setSecs] = React.useState(42);
  React.useEffect(() => {
    const id = setInterval(() => setSecs(s => s > 0 ? s - 1 : 60), 1000);
    return () => clearInterval(id);
  }, []);
  return secs;
}
function BatchPillX({ secs }) {
  const pct = (secs/60)*100;
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:8, padding:'4px 10px',
      background:'var(--accent-soft)', borderRadius:4,
      fontFamily:'var(--font-mono)', fontSize:11, color:'var(--accent)', fontVariantNumeric:'tabular-nums',
    }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--accent)' }} />
      <span style={{ letterSpacing:'0.04em', textTransform:'uppercase', fontSize:10, color:'rgba(63,182,217,0.7)' }}>batch</span>
      <span>0:{secs.toString().padStart(2,'0')}</span>
      <div style={{ width:48, height:2, background:'rgba(63,182,217,0.16)', borderRadius:1, overflow:'hidden' }}>
        <div style={{ width:`${pct}%`, height:'100%', background:'var(--accent)', transition:'width 1000ms linear' }} />
      </div>
    </div>
  );
}

// ── Top nav with Dev zone group ──────────────────────────────────────────
function NavTab({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      background:active?'var(--surface-1)':'transparent', border:0, padding:'5px 10px', borderRadius:3,
      color: active ? 'var(--fg-1)' : 'var(--fg-3)',
      fontFamily:'var(--font-sans)', fontSize:12, fontWeight:500, cursor:'pointer',
    }}>{label}</button>
  );
}

function GlobalNav({ secs, activeTop, setActiveTop }) {
  const [devOpen, setDevOpen] = React.useState(false);
  const devRef = React.useRef(null);
  React.useEffect(() => {
    const close = (e) => { if (devRef.current && !devRef.current.contains(e.target)) setDevOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);
  const devActive = ['Overview','Blocks','Trading'].includes(activeTop);
  return (
    <div style={{
      position:'sticky', top:0, zIndex:50, height:56,
      background:'rgba(10,14,18,0.84)', backdropFilter:'var(--blur-nav)', WebkitBackdropFilter:'var(--blur-nav)',
      borderBottom:'1px solid var(--border-1)',
      display:'flex', alignItems:'center', padding:'0 24px', gap:18,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <img src="../assets/sybil-mark.png" width="22" height="22" style={{ borderRadius:3 }} alt="" />
        <span style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:15, letterSpacing:'-0.01em', textTransform:'uppercase' }}>SYBIL</span>
      </div>
      <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--warn)', padding:'2px 7px', background:'var(--warn-soft)', borderRadius:9999, letterSpacing:'0.04em', textTransform:'uppercase' }}>testnet</span>
      <div style={{ display:'flex', gap:2 }}>
        {['Markets','Activity','Portfolio','Docs'].map(l => <NavTab key={l} label={l} active={activeTop===l} onClick={() => setActiveTop(l)} />)}
        <div style={{ position:'relative' }} ref={devRef}>
          <button onClick={() => setDevOpen(o => !o)} style={{
            background: devActive ? 'var(--surface-1)' : 'transparent', border:0, padding:'5px 10px', borderRadius:3,
            color: devActive ? 'var(--fg-1)' : 'var(--fg-3)',
            fontFamily:'var(--font-sans)', fontSize:12, fontWeight:500, cursor:'pointer',
            display:'flex', alignItems:'center', gap:6,
          }}>
            Dev zone
            <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m3 4.5 3 3 3-3"/></svg>
          </button>
          {devOpen && (
            <div style={{
              position:'absolute', top:'calc(100% + 6px)', left:0,
              background:'var(--surface-1)', border:'1px solid var(--border-2)', borderRadius:4,
              padding:4, minWidth:160, boxShadow:'0 10px 30px rgba(0,0,0,0.35)',
            }}>
              <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'var(--fg-4)', textTransform:'uppercase', letterSpacing:'0.04em', padding:'6px 10px 4px' }}>Dev zone</div>
              {['Overview','Blocks','Trading'].map(l => (
                <button key={l} onClick={() => { setActiveTop(l); setDevOpen(false); }} style={{
                  display:'block', width:'100%', textAlign:'left',
                  background: activeTop===l ? 'var(--bg-2)' : 'transparent',
                  border:0, padding:'7px 10px', borderRadius:3,
                  color: activeTop===l ? 'var(--fg-1)' : 'var(--fg-2)',
                  fontFamily:'var(--font-sans)', fontSize:12, cursor:'pointer',
                }}>{l}</button>
              ))}
            </div>
          )}
        </div>
      </div>
      <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
        <BatchPillX secs={secs} />
        <div style={{ display:'flex', alignItems:'center', gap:8, background:'var(--surface-1)', border:'1px solid var(--border-2)', borderRadius:3, padding:'4px 10px', width:240 }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{ color:'var(--fg-3)' }}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <span style={{ flex:1, color:'var(--fg-4)', fontSize:12 }}>Search events, markets</span>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--fg-3)' }}>⌘K</span>
        </div>
        <button style={{ background:'transparent', border:'1px solid var(--border-2)', borderRadius:3, padding:'5px 10px', color:'var(--fg-1)', fontFamily:'var(--font-sans)', fontSize:12, fontWeight:500, cursor:'pointer' }}>0xA17F···c92E</button>
      </div>
    </div>
  );
}

// ── Category tabs ────────────────────────────────────────────────────────
function CategoryTabs({ active, onChange }) {
  return (
    <div style={{ display:'flex', gap:2, borderBottom:'1px solid var(--border-1)', padding:'0 24px', alignItems:'center', overflow:'auto' }}>
      {CATEGORIES_V3.map(c => {
        const a = active === c;
        return (
          <button key={c} onClick={() => onChange(c)} style={{
            background:'transparent', border:0, padding:'10px 12px',
            color: a ? 'var(--fg-1)' : 'var(--fg-3)',
            fontFamily:'var(--font-sans)', fontSize:12, fontWeight: a ? 600 : 500,
            cursor:'pointer', borderBottom:'2px solid', borderColor: a ? 'var(--accent)' : 'transparent', marginBottom:-1, whiteSpace:'nowrap',
          }}>{c}</button>
        );
      })}
      <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:6, paddingLeft:16, flexShrink:0 }}>
        {['Volume','Top movers','Closing soon','New'].map((s,i) => (
          <button key={s} style={{
            background:'transparent', border:'1px solid', borderRadius:3, padding:'4px 8px',
            borderColor: i===0 ? 'var(--border-3)' : 'var(--border-1)',
            color: i===0 ? 'var(--fg-1)' : 'var(--fg-3)',
            fontFamily:'var(--font-mono)', fontSize:10, cursor:'pointer', textTransform:'uppercase', letterSpacing:'0.04em',
          }}>{s}</button>
        ))}
      </div>
    </div>
  );
}

// ── Sparkline ────────────────────────────────────────────────────────────
function Spark({ data, w=120, h=28, stroke='#3FB6D9', fill=true }) {
  const max = Math.max(...data), min = Math.min(...data); const r = max-min || 1;
  const step = w/(data.length-1);
  const pts = data.map((v,i) => [i*step, (1-(v-min)/r)*h]);
  const path = pts.map((p,i) => (i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width={w} height={h} style={{ display:'block', overflow:'visible' }}>
      {fill && <path d={path + ` L ${w} ${h} L 0 ${h} Z`} fill={stroke} fillOpacity="0.14"/>}
      <path d={path} fill="none" stroke={stroke} strokeWidth="1.25" strokeLinejoin="round"/>
    </svg>
  );
}

// ── Event image placeholder (gradient + glyph) ───────────────────────────
const CAT_GLYPH = {
  Politics:'⚖', Elections:'★', Economy:'%', Tech:'◆', Finance:'$',
  Culture:'♫', Climate:'☀', Mentions:'❝', World:'⌖', Crypto:'⬢', Sports:'⚽',
};
function EventImage({ e }) {
  const dot = categoryDotV3(e.category);
  return (
    <div style={{
      width:48, height:48, borderRadius:6, flexShrink:0,
      display:'flex', alignItems:'center', justifyContent:'center',
      background: `linear-gradient(135deg, ${dot}33, ${dot}14)`,
      border:`1px solid ${dot}40`,
      color: dot, fontSize: 22, lineHeight: 1, fontFamily:'var(--font-display)',
    }}>{CAT_GLYPH[e.category] || '◆'}</div>
  );
}

// ── Shared atoms ─────────────────────────────────────────────────────────
function CategoryTag({ cat }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:'var(--font-mono)', fontSize:10, color:'var(--fg-3)', textTransform:'uppercase', letterSpacing:'0.04em' }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:categoryDotV3(cat) }} />
      {cat}
    </span>
  );
}

// Footer = same fields for ALL card types (no resolves date; show liq instead)
function CardFooter({ e }) {
  const liq = e.outcomes.reduce((s,o)=>{
    const v = (o.liq||'').replace(/[^0-9.]/g,'');
    const mult = (o.liq||'').includes('M') ? 1000 : 1;
    return s + (parseFloat(v)||0) * mult;
  }, 0);
  const liqStr = liq >= 1000 ? (liq/1000).toFixed(1).replace(/\.0$/,'')+'M' : Math.round(liq)+'K';
  return (
    <div style={{ display:'flex', gap:10, fontFamily:'var(--font-mono)', fontSize:9.5, color:'var(--fg-3)', textTransform:'uppercase', letterSpacing:'0.03em', alignItems:'center', whiteSpace:'nowrap', overflow:'hidden' }}>
      <span><span style={{ color:'var(--fg-4)' }}>vol </span>${e.vol}</span>
      <span><span style={{ color:'var(--fg-4)' }}>liq </span>${liqStr}</span>
      <span style={{ marginLeft:'auto' }}><span style={{ color:'var(--fg-4)' }}>traders </span>{fmtNum(e.traders)}</span>
    </div>
  );
}

// Title block — image + title (uniform 56px region)
function TitleBlock({ e }) {
  return (
    <div style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
      <EventImage e={e} />
      <div style={{
        fontFamily:'var(--font-sans)', fontSize:16, fontWeight:600, color:'var(--fg-1)',
        lineHeight:'20px', letterSpacing:'-0.005em',
        display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical',
        overflow:'hidden',
      }}>{e.title}</div>
    </div>
  );
}

// Featured price block (top outcome) — same shape regardless of card type
function FeaturedPrice({ outcome, label }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:12, alignItems:'center', padding:'10px 12px', background:'var(--bg-2)', borderRadius:4, border:'1px solid var(--border-1)' }}>
      <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
        <span style={{ fontFamily:'var(--font-sans)', fontSize:12, color:'var(--fg-2)' }}>{label || outcome.label}</span>
        <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:24, color: outcome.delta24>=0?'var(--yes)':'var(--no)', fontVariantNumeric:'tabular-nums', letterSpacing:'-0.005em' }}>{outcome.yes}¢</span>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color: outcome.delta24>=0?'var(--yes)':'var(--no)' }}>{outcome.delta24>=0?'+':''}{outcome.delta24}%</span>
        </div>
      </div>
      <Spark data={SERIES_V3[outcome.id]} w={120} h={36} stroke={outcome.delta24>=0?'#5BD99A':'#E8556C'} />
    </div>
  );
}

// Compact outcome row — used for both multi cards and binary card
function OutcomeRow({ label, yes, delta, vol24, color, dim=false }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 60px 50px 60px', gap:10, padding:'7px 4px', alignItems:'center', fontVariantNumeric:'tabular-nums' }}>
      <span style={{ fontFamily:'var(--font-sans)', fontSize:12, color: dim ? 'var(--fg-3)' : 'var(--fg-2)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{label}</span>
      <span style={{ fontFamily:'var(--font-mono)', fontSize:13, color: color || (delta>=0?'var(--yes)':'var(--no)'), textAlign:'right' }}>{yes}¢</span>
      <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color: color || (delta>=0?'var(--yes)':'var(--no)'), textAlign:'right' }}>{delta>=0?'+':''}{delta}%</span>
      <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--fg-3)', textAlign:'right' }}>${vol24}</span>
    </div>
  );
}

// ── Multi-outcome card ───────────────────────────────────────────────────
function MultiCard({ e }) {
  const top = e.outcomes[0];
  const rest = e.outcomes.slice(1);
  const SHOW = 3;  // exactly 3 secondary rows for grid uniformity
  return (
    <div className="ev-card">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <CategoryTag cat={e.category} />
        <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--fg-4)' }}>
          {e.outcomes.length} outcomes{rest.length > SHOW ? ` · +${rest.length-SHOW} more` : ''}
        </span>
      </div>
      <TitleBlock e={e} />
      <FeaturedPrice outcome={top} />
      <div style={{ display:'flex', flexDirection:'column', borderTop:'1px solid var(--border-1)' }}>
        {rest.slice(0, SHOW).map(o => (
          <div key={o.id} style={{ borderBottom:'1px solid var(--border-1)' }}>
            <OutcomeRow label={o.label} yes={o.yes} delta={o.delta24} vol24={o.vol24}/>
          </div>
        ))}
        {Array.from({ length: Math.max(0, SHOW - rest.length) }).map((_,i) => (
          <div key={'pad'+i} style={{ borderBottom:'1px solid var(--border-1)', padding:'7px 4px', height:30 }} />
        ))}
      </div>
      <CardFooter e={e} />
    </div>
  );
}

// ── Binary card — IDENTICAL skeleton to multi-card ───────────────────────
// Featured = Yes outcome. Then exactly 3 row slots:
//   row 1 = Yes
//   row 2 = No
//   row 3 = empty filler so heights match multi-card grid
function BinaryCard({ e }) {
  const o = e.outcomes[0];
  const noOutcome = { label:'No', yes:100-o.yes, delta24:-o.delta24, vol24:o.vol24 };
  const yesOutcome = { label:'Yes', yes:o.yes, delta24:o.delta24, vol24:o.vol24 };
  return (
    <div className="ev-card">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <CategoryTag cat={e.category} />
        <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'var(--fg-4)', textTransform:'uppercase', letterSpacing:'0.04em' }}>Yes / No</span>
      </div>
      <TitleBlock e={e} />
      <FeaturedPrice outcome={o} label="Yes" />
      <div style={{ display:'flex', flexDirection:'column', borderTop:'1px solid var(--border-1)' }}>
        <div style={{ borderBottom:'1px solid var(--border-1)' }}>
          <OutcomeRow label="Yes" yes={yesOutcome.yes} delta={yesOutcome.delta24} vol24={yesOutcome.vol24} color="var(--yes)" />
        </div>
        <div style={{ borderBottom:'1px solid var(--border-1)' }}>
          <OutcomeRow label="No" yes={noOutcome.yes} delta={noOutcome.delta24} vol24={noOutcome.vol24} color="var(--no)" />
        </div>
        <div style={{ borderBottom:'1px solid var(--border-1)', padding:'7px 4px', height:30 }} />
      </div>
      <CardFooter e={e} />
    </div>
  );
}

// ── Page ─────────────────────────────────────────────────────────────────
function App() {
  const secs = useBatchClock();
  const [activeTop, setActiveTop] = React.useState('Markets');
  const [active, setActive] = React.useState('All');
  const filtered = active === 'All' ? EVENTS_V3 : EVENTS_V3.filter(e => e.category === active);
  return (
    <div className="page">
      <GlobalNav secs={secs} activeTop={activeTop} setActiveTop={setActiveTop} />
      <ClearingTicker items={MARKETS_V2} secs={secs} />
      <div style={{ padding:'18px 24px 4px', display:'flex', alignItems:'baseline', gap:14 }}>
        <h1 style={{ fontFamily:'var(--font-sans)', fontSize:22, fontWeight:600, letterSpacing:'-0.01em', color:'var(--fg-1)', margin:0 }}>All markets</h1>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg-3)' }}>
          <span style={{ color:'var(--fg-4)' }}>// </span>{filtered.length} events · uniform clearing every 60s
        </span>
      </div>
      <CategoryTabs active={active} onChange={setActive} />
      <div className="scroll">
        <div className="grid-3">
          {filtered.map(e => e.type === 'binary' ? <BinaryCard key={e.id} e={e}/> : <MultiCard key={e.id} e={e}/>)}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
