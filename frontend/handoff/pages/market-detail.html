<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sybil — Fed rate decision · V2 Batch theater</title>
  <link rel="icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../tokens/colors_and_type.css">
  <style>
    html, body { background: var(--bg-1); margin: 0; min-height: 100%; }
    body { color: var(--fg-1); font-family: var(--font-sans); }
    /* Override the page-frame fixed width — go full viewport */
    .v2-host > div { width: 100% !important; min-height: 100vh; }
  </style>
</head>
<body>
<div id="root" class="v2-host"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../data/fed-data.jsx"></script>
<script type="text/babel" src="../data/fed-primitives.jsx"></script>
<script type="text/babel" src="../data/fed-fba-panel.jsx"></script>
<script type="text/babel" src="../data/fed-right-rail-modes.jsx"></script>
<script type="text/babel" src="../data/fed-variations.jsx"></script>

<script type="text/babel">
function App() {
  const secs = useBatchSecs();
  const series = getSeriesByOutcome(FED_MARKET);
  return (
    <V2BatchTheater
      market={FED_MARKET}
      series={series}
      history={FED_BATCH_HISTORY}
      comments={FED_COMMENTS}
      secs={secs}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
