<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sybil — Portfolio</title>
<link rel="icon" href="../assets/favicon.ico">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--bg-1); }
  body { color: var(--fg-1); font-family: var(--font-sans); }
  .pf-shell {
    width: 100%; min-height: 100%; background: var(--bg-1); color: var(--fg-1);
    font-family: var(--font-sans); position: relative;
  }
  .pf-shell *::-webkit-scrollbar { width: 6px; height: 6px; }
  .pf-shell *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:2px; font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:0.04em; font-weight:500; }
  .pill-yes { color: var(--yes); background: var(--yes-soft); }
  .pill-no  { color: var(--no);  background: var(--no-soft); }
  .row-hover:hover { background: var(--surface-2); }
  .tab-btn { background: transparent; border: 0; padding: 10px 14px; color: var(--fg-3); font-family: var(--font-sans); font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 1.5px solid transparent; margin-bottom: -1px; }
  .tab-btn.active { color: var(--fg-1); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--fg-2); }
  .anno { font-family: var(--font-mono); font-size: 11px; line-height:16px; color: var(--fg-3); }
  .anno::before { content:'// '; color: var(--fg-4); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../data/PortfolioData.jsx"></script>
<script type="text/babel" src="../data/tweaks-panel.jsx"></script>
<script type="text/babel" src="../data/PortfolioPieces.jsx"></script>
<script type="text/babel" src="../data/PortfolioVariants.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "positionsLayout": "table",
  "showEquityChart": true,
  "showAllocation": false,
  "density": "dense",
  "batchDetail": "standard"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <React.Fragment>
      <VariantClassic t={t} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Holdings">
          <TweakRadio label="Positions layout" value={t.positionsLayout}
            options={[{value:'table', label:'Table'},{value:'cards', label:'Cards'}]}
            onChange={(v) => setTweak('positionsLayout', v)} />
          <TweakRadio label="Density" value={t.density}
            options={[{value:'balanced', label:'Balanced'},{value:'dense', label:'Dense'}]}
            onChange={(v) => setTweak('density', v)} />
        </TweakSection>
        <TweakSection label="Hero">
          <TweakToggle label="Equity chart" value={t.showEquityChart}
            onChange={(v) => setTweak('showEquityChart', v)} />
          <TweakToggle label="Allocation strip" value={t.showAllocation}
            onChange={(v) => setTweak('showAllocation', v)} />
        </TweakSection>
        <TweakSection label="Batch framing">
          <TweakRadio label="Detail" value={t.batchDetail}
            options={[{value:'standard', label:'Standard'},{value:'minimal', label:'Minimal'}]}
            onChange={(v) => setTweak('batchDetail', v)} />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
