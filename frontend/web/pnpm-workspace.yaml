minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  # Security fix for GHSA-fx2h-pf6j-xcff and GHSA-v6wh-96g9-6wx3.
  # Keep the exception version-specific so later Vite releases age normally.
  - vite@8.0.16
  # Security fixes for GHSA-6gpp-xcg3-4w24, GHSA-m99w-x7hq-7vfj,
  # GHSA-89xv-2m56-2m9x, and GHSA-p9j2-gv94-2wf4.
  - next@16.2.11
  - eslint-config-next@16.2.11
  - '@next/env@16.2.11'
  - '@next/eslint-plugin-next@16.2.11'
  - '@next/swc-darwin-arm64@16.2.11'
  - '@next/swc-darwin-x64@16.2.11'
  - '@next/swc-linux-arm64-gnu@16.2.11'
  - '@next/swc-linux-arm64-musl@16.2.11'
  - '@next/swc-linux-x64-gnu@16.2.11'
  - '@next/swc-linux-x64-musl@16.2.11'
  - '@next/swc-win32-arm64-msvc@16.2.11'
  - '@next/swc-win32-x64-msvc@16.2.11'
  # Security fix for GHSA-v2hh-gcrm-f6hx.
  - fast-uri@3.1.4
  # Security fix for GHSA-r28c-9q8g-f849.
  - postcss@8.5.18
overrides:
  # Security floors for transitive parents that still pin vulnerable releases.
  # `pnpm audit` owns removal; the Sharp runtime smoke proves Next compatibility.
  brace-expansion@1: 1.1.16
  brace-expansion@2: 2.1.2
  fast-uri@3: 3.1.4
  js-yaml@4: 4.3.0
  postcss: 8.5.18
  sharp@0.34: 0.35.0
  vite: 8.0.16
allowBuilds:
  msw: false
  sharp: false
  unrs-resolver: false
