[package]
name = "matching-solver"
version = "0.1.0"
edition = "2021"
description = "Solvers for the prediction market matching problem"

[dependencies]
matching-engine = { path = "../matching-engine" }
rand = "0.8"

[dependencies.good_lp]
version = "1.10"
features = ["highs"]
optional = true

[features]
default = []
milp = ["good_lp"]
lp-validation = ["good_lp"]
