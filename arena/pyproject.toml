[project]
name = "sybil-arena"
version = "0.1.0"
description = "AI Agent Trading Competition for Sybil Prediction Markets"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",          # Async HTTP client
    "attrs>=23.2",          # Runtime models for the generated OpenAPI client (sybil_client/_generated)
    "pydantic>=2.0",        # Data validation
    "websockets>=16,<17",   # Resumable public block stream + exchange feeds
    "textual>=1.0",         # TUI framework
    "rich>=13.0",           # Pretty console output (used by textual + final leaderboard)
    "python-dotenv>=1.2.1",
    "pandas>=2.3.3",
    "streamlit>=1.55.0",
    "altair>=6.0.0",
    "openai>=2.16.0",
    "trafilatura>=2.0.0",
    "feedparser>=6.0",
    "prometheus-client>=0.20",  # Arena metrics exporter (SYB-211)
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]
sports = [
    "aiohttp>=3.9",         # For sports API
]
llm = [
    "openai>=1.0",          # For GPT-powered bots
    "trafilatura>=2.0",     # Article text extraction
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sybil_client", "bots", "feeds", "sim", "markets", "live"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "mm_backtest.py",
    "mm_param_sweep.py",
    "mm_pnl_analysis.py",
    "viz",
    # Vendored, machine-generated OpenAPI client. Regenerated by
    # `just arena-sdk-regen`; its style is not ours to lint.
    "sybil_client/_generated",
]

[tool.ruff.lint]
ignore = ["E501"]
# These entrypoints extend sys.path before importing local packages.
per-file-ignores = { "examples/full_competition.py" = ["E402"], "sim/runner.py" = ["E402"] }

[tool.pytest.ini_options]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]
