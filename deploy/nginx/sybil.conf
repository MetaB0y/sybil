# TLS terminates in the host nginx because this is a shared machine. Sybil's
# Caddy remains the application router and is reachable only on loopback.
map $http_upgrade $sybil_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name 62-171-170-238.nip.io
                app.62-171-170-238.nip.io
                arena.62-171-170-238.nip.io
                grafana.62-171-170-238.nip.io
                prover.62-171-170-238.nip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 62-171-170-238.nip.io
                app.62-171-170-238.nip.io
                arena.62-171-170-238.nip.io
                grafana.62-171-170-238.nip.io
                prover.62-171-170-238.nip.io;

    ssl_certificate /etc/letsencrypt/live/62-171-170-238.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/62-171-170-238.nip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3108;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $sybil_connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
