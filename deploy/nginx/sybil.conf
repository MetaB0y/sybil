# TLS terminates in the host nginx because this is a shared machine. Sybil's
# Caddy remains the application router and is reachable only on loopback.
#
# Three certificate scopes are in play. The product hostnames each have their
# own certificate; the operator dashboards stay on the original nip.io
# certificate, which still covers all five of its original names.
map $http_upgrade $sybil_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.sybil.exchange
                api.sybil.exchange
                arena.62-171-170-238.nip.io
                grafana.62-171-170-238.nip.io
                prover.62-171-170-238.nip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Shared proxy body. Caddy routes by Host header, so every hostname below
# forwards to the same loopback listener and Caddy picks the right site block.
# `Host $host` is what makes that work — do not rewrite it.
server {
    # Only this block carries the `http2` listen parameter. Protocol options are
    # per listen socket, and nginx warns when another server block redefines
    # them for the same socket (sites-available/unbiased listens plain
    # `443 ssl`). nginx 1.24 has no per-server `http2 on;` directive, so the
    # single-declaration form is the one that stays warning-free. Confirm with
    # `nginx -t` after any change here.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.sybil.exchange;

    ssl_certificate /etc/letsencrypt/live/app.sybil.exchange/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sybil.exchange/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3108;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $sybil_connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.sybil.exchange;

    ssl_certificate /etc/letsencrypt/live/api.sybil.exchange/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sybil.exchange/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3108;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $sybil_connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

# Operator dashboards keep the nip.io names and certificate. They are behind
# Caddy basic auth and have no passkey or branding reason to move.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name arena.62-171-170-238.nip.io
                grafana.62-171-170-238.nip.io
                prover.62-171-170-238.nip.io;

    ssl_certificate /etc/letsencrypt/live/62-171-170-238.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/62-171-170-238.nip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3108;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $sybil_connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
