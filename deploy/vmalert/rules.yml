groups:
  - name: sybil
    interval: 30s
    rules:
      - alert: SolveTimeHigh
        expr: |
          rate(sybil_solve_time_seconds_sum[5m])
          / clamp_min(rate(sybil_solve_time_seconds_count[5m]), 0.001)
          > 0.1
        for: 2m
        labels:
          severity: warning
          component: sequencer
        annotations:
          summary: "Solver average latency above 100ms"
          description: "Solver average latency has been above 100ms for 2m (current average: {{ $value | humanizeDuration }})."

      - alert: RejectionRateHigh
        expr: |
          sum(rate(sybil_order_submissions_total{result="rejected"}[5m]))
          / clamp_min(sum(rate(sybil_order_submissions_total[5m])), 0.0001)
          > 0.5
        for: 5m
        labels:
          severity: warning
          component: sequencer
        annotations:
          summary: "Order rejection rate above 50%"
          description: "More than half of submitted orders are being rejected over the last 5m (current ratio: {{ $value | humanizePercentage }})."

      - alert: RejectionRateCritical
        expr: |
          sum(increase(sybil_order_submissions_total{result="rejected"}[5m])) >= 20
          and
          (
            sum(increase(sybil_order_submissions_total{result="rejected"}[5m]))
            / clamp_min(sum(increase(sybil_order_submissions_total[5m])), 1)
          ) > 0.8
        for: 3m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Most order submissions are being rejected"
          description: "At least 20 submissions arrived in 5m and more than 80% were rejected. This often means accounts are inventory/cash locked or clients are submitting invalid orders."

      - alert: LiveTradingNoFills
        expr: |
          sum(increase(sybil_order_submissions_total[10m])) >= 50
          and
          sum(increase(sybil_market_fills_total[10m])) == 0
        for: 5m
        labels:
          severity: critical
          component: arena
        annotations:
          summary: "Live trading has submissions but no fills"
          description: "At least 50 order submissions arrived over 10m, but no fills were recorded. Blocks may still be producing while trading is effectively stalled."

      - alert: AcceptedOrdersNoFills
        expr: |
          sum(increase(sybil_order_submissions_total{result="accepted"}[10m])) >= 20
          and
          sum(increase(sybil_market_fills_total[10m])) == 0
        for: 10m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Accepted orders are not filling"
          description: "At least 20 order submissions were accepted over 10m, but no fills were recorded. This may indicate stale resting liquidity, non-crossing prices, or an arena strategy issue."

      - alert: LiveTradingLowFillRate
        expr: |
          sum(increase(sybil_order_submissions_total{result="accepted"}[30m])) >= 1000
          and
          (
            sum(increase(sybil_market_fills_total[30m]))
            / clamp_min(sum(increase(sybil_order_submissions_total{result="accepted"}[30m])), 1)
          ) < 0.005
          and
          sum(increase(sybil_market_fills_total[30m])) < 10
        for: 30m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Live trading fill rate is low"
          description: "At least 1000 accepted submissions arrived in 30m, fewer than 0.5% filled, and fewer than 10 fills landed. Trading is not fully stalled, but live activity is abnormally thin."

      - alert: LiveTradingLowMarketCoverage
        expr: |
          sum(increase(sybil_order_submissions_total{result="accepted"}[30m])) >= 1000
          and
          max(sybil_arena_synthetic_markets) >= 20
          and
          count(increase(sybil_market_fills_total[30m]) > 0)
            < 0.1 * max(sybil_arena_synthetic_markets)
        for: 30m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Fills are concentrated in very few markets"
          description: "Fewer than 10% of the synthetic cohort filled over 30m despite at least 1000 accepted submissions. The demo may look narrow even if total fill count is nonzero."

      - alert: PendingOrderBookHigh
        expr: sybil_pending_orders > 250
        for: 10m
        labels:
          severity: warning
          component: sequencer
        annotations:
          summary: "Pending order book is unusually large"
          description: "The pending order book has held more than 250 orders for 10m (current: {{ $value }}). Live arena should normally use IOC, so sustained pending inventory is suspicious."

      - alert: StalePendingOrderBook
        expr: |
          max(sybil_pending_orders) > 250
          and
          sum(increase(sybil_market_fills_total[10m])) == 0
        for: 10m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Pending orders are accumulating without fills"
          description: "The pending order book is above 250 and no fills have landed in 10m. This matches the stale-GTC failure mode seen in the live arena deployment."

      - alert: SequencerDown
        expr: up{job="sybil-api"} == 0
        for: 3m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "sybil-api scrape target is down"
          description: "VictoriaMetrics has not been able to scrape sybil-api for 3m. Check the API container and host pressure before redeploying."

      - alert: ArenaDown
        expr: up{job="sybil-arena"} == 0
        for: 3m
        labels:
          severity: critical
          component: arena
        annotations:
          summary: "Arena scrape target is down"
          description: "VictoriaMetrics has not been able to scrape the Arena runner for 3m. Trading and Arena-owned liveness signals may be unavailable."

      - alert: NativeMarketMakerDown
        expr: up{job="sybil-native-mm"} == 0
        for: 3m
        labels:
          severity: critical
          component: native-mm
        annotations:
          summary: "Native market-maker scrape target is down"
          description: "VictoriaMetrics has not been able to scrape the native MM for 3m. Check the container, monitoring listener, and actor task."

      - alert: NativeMarketMakerNotReady
        expr: sybil_native_mm_ready == 0
        for: 2m
        labels:
          severity: critical
          component: native-mm
        annotations:
          summary: "Native market-maker quote loop is not ready"
          description: "The native MM has failed its full operating contract for 2m: fresh progress, eligible markets, quote coverage, normal risk mode, and recent accepted submissions are all required. Follow the MM liveness runbook."

      - alert: NativeMarketMakerNoQuotes
        expr: |
          sybil_native_mm_eligible_quote_markets > 0
          and
          sybil_native_mm_quoted_markets == 0
        for: 1m
        labels:
          severity: critical
          component: native-mm
        annotations:
          summary: "Native MM is eligible but submitting no quotes"
          description: "The native MM has eligible markets but its selected quote set has covered zero markets for 1m. Check risk mode, position sync, and quote-generation diagnostics."

      - alert: NativeMarketMakerCoverageLow
        expr: |
          sybil_native_mm_eligible_quote_markets > 0
          and
          (
            sybil_native_mm_quoted_markets
            / clamp_min(sybil_native_mm_eligible_quote_markets, 1)
          ) < 0.95
        for: 3m
        labels:
          severity: warning
          component: native-mm
        annotations:
          summary: "Native MM quote coverage is below 95%"
          description: "Fewer than 95% of eligible native markets have a quote. Compare eligible, quoted, two-sided, and order-cap metrics."

      - alert: NativeMarketMakerTwoSidedCoverageLow
        expr: |
          sybil_native_mm_eligible_quote_markets > 0
          and
          (
            sybil_native_mm_two_sided_quote_markets
            / clamp_min(sybil_native_mm_eligible_quote_markets, 1)
          ) < 0.95
          and on(job, instance)
          sybil_native_mm_mode{mode="normal"} == 1
        for: 3m
        labels:
          severity: warning
          component: native-mm
        annotations:
          summary: "Native MM two-sided coverage is below 95%"
          description: "The native MM is in normal mode, but fewer than 95% of eligible markets have both YES and NO cash-backed quotes. Check per-market position caps and generated order capacity."

      - alert: NativeMarketMakerProductLiquidityLow
        expr: |
          last_over_time(sybil_synthetic_mm_eligible_markets{catalog="native"}[15m]) > 0
          and
          (
            last_over_time(sybil_synthetic_mm_liquid_markets{catalog="native"}[15m])
            / clamp_min(last_over_time(sybil_synthetic_mm_eligible_markets{catalog="native"}[15m]), 1)
          ) < 0.95
        for: 10m
        labels:
          severity: warning
          component: native-mm
        annotations:
          summary: "Native MM product liquidity is below 95%"
          description: "The external probe sees nonzero rolling liquidity on fewer than 95% of active native markets. Actor-local quote counters may be green; compare product marks, NO-side price normalization, and the current batch quote bundle."

      - alert: NativeMarketMakerSubmissionStalled
        expr: |
          sybil_native_mm_submission_lag_blocks > 2
          or
          (
            sybil_native_mm_last_submission_attempt_block
            unless
            sybil_native_mm_last_successful_submission_block
          )
        for: 2m
        labels:
          severity: critical
          component: native-mm
        annotations:
          summary: "Native MM quote bundles are not being accepted"
          description: "The native MM is attempting non-empty bundles but has no accepted submission within two observed blocks. Inspect structured API rejection logs and submission failure counters."

      - alert: NativeMarketMakerReduceOnly
        expr: sybil_native_mm_mode{mode="reduce_only"} == 1
        for: 5m
        labels:
          severity: warning
          component: native-mm
        annotations:
          summary: "Native MM remains in reduce-only mode"
          description: "Directional exposure has remained above the configured cap for 5m. The MM is still unwinding, but is not providing normal two-sided liquidity."

      - alert: NativeMarketMakerPairedInventoryStuck
        expr: |
          min_over_time(sybil_native_mm_paired_position_units[15m]) > 1000000
          and
          delta(sybil_native_mm_paired_position_units[15m]) >= 0
        for: 5m
        labels:
          severity: warning
          component: native-mm
        annotations:
          summary: "Native MM complete-set inventory is not draining"
          description: "More than 1,000 redeemable YES+NO shares have persisted without a net decrease over 15m. Check compaction submission failures, ordinary IOC admission, and settlement."

      - alert: NativeMarketMakerQuoteCapacityLimited
        expr: sybil_native_mm_quote_capacity_limited == 1
        for: 2m
        labels:
          severity: warning
          component: native-mm
        annotations:
          summary: "Native MM is rotating partial market coverage"
          description: "The native MM order cap is omitting eligible markets from each quote cycle. Raise measured capacity or reduce the configured universe."

      - alert: PolymarketIntegrationDown
        expr: up{job="sybil-polymarket"} == 0
        for: 3m
        labels:
          severity: critical
          component: polymarket
        annotations:
          summary: "Polymarket integration scrape target is down"
          description: "VictoriaMetrics has not been able to scrape the Polymarket owner process for 3m. Check the container and its monitoring listener."

      - alert: PolymarketIntegrationNotReady
        expr: sybil_polymarket_ready == 0
        for: 2m
        labels:
          severity: critical
          component: polymarket
        annotations:
          summary: "Polymarket integration is not ready"
          description: "At least one required sync, feed, MM, or resolution invariant has failed for 2m. MM readiness includes quote coverage, normal risk mode, and accepted-submission freshness."

      - alert: PolymarketMarketMakerNoQuotes
        expr: |
          sybil_polymarket_mm_eligible_quote_markets > 0
          and
          sybil_polymarket_mm_quoted_markets == 0
        for: 1m
        labels:
          severity: critical
          component: polymarket
        annotations:
          summary: "Polymarket MM is eligible but submitting no quotes"
          description: "The mirror MM has eligible markets but its selected quote set has covered zero markets for 1m. Check feed eligibility, risk mode, position sync, and quote generation."

      - alert: PolymarketMarketMakerCoverageLow
        expr: |
          sybil_polymarket_mm_eligible_quote_markets > 0
          and
          (
            sybil_polymarket_mm_quoted_markets
            / clamp_min(sybil_polymarket_mm_eligible_quote_markets, 1)
          ) < 0.95
        for: 3m
        labels:
          severity: warning
          component: polymarket
        annotations:
          summary: "Polymarket MM quote coverage is below 95%"
          description: "Fewer than 95% of eligible mirrored markets have a quote. Compare tracked, eligibility-reason, quoted, and order-cap metrics."

      - alert: PolymarketMarketMakerTwoSidedCoverageLow
        expr: |
          sybil_polymarket_mm_eligible_quote_markets > 0
          and
          (
            sybil_polymarket_mm_two_sided_quote_markets
            / clamp_min(sybil_polymarket_mm_eligible_quote_markets, 1)
          ) < 0.95
          and on(job, instance)
          sybil_polymarket_mm_mode{mode="normal"} == 1
        for: 3m
        labels:
          severity: warning
          component: polymarket
        annotations:
          summary: "Polymarket MM two-sided coverage is below 95%"
          description: "The mirror MM is in normal mode, but fewer than 95% of eligible markets have both YES and NO cash-backed quotes. Check position caps and order capacity."

      - alert: PolymarketMarketMakerProductLiquidityLow
        expr: |
          last_over_time(sybil_synthetic_mm_eligible_markets{catalog="polymarket"}[15m]) > 0
          and
          (
            last_over_time(sybil_synthetic_mm_liquid_markets{catalog="polymarket"}[15m])
            / clamp_min(last_over_time(sybil_synthetic_mm_eligible_markets{catalog="polymarket"}[15m]), 1)
          ) < 0.95
        for: 10m
        labels:
          severity: warning
          component: polymarket
        annotations:
          summary: "Polymarket MM product liquidity is below 95%"
          description: "The external probe sees nonzero rolling liquidity on fewer than 95% of fresh, in-band mirrored markets. Compare the provider reference, product mark, and actor-local quote coverage."

      - alert: PolymarketMarketMakerSubmissionStalled
        expr: |
          sybil_polymarket_mm_submission_lag_blocks > 2
          or
          (
            sybil_polymarket_mm_last_submission_attempt_block
            unless
            sybil_polymarket_mm_last_successful_submission_block
          )
        for: 2m
        labels:
          severity: critical
          component: polymarket
        annotations:
          summary: "Polymarket MM quote bundles are not being accepted"
          description: "The mirror MM is attempting non-empty bundles but has no accepted submission within two observed blocks. Inspect structured API rejection logs and submission failure counters."

      - alert: PolymarketMarketMakerReduceOnly
        expr: sybil_polymarket_mm_mode{mode="reduce_only"} == 1
        for: 5m
        labels:
          severity: warning
          component: polymarket
        annotations:
          summary: "Polymarket MM remains in reduce-only mode"
          description: "Directional exposure has remained above the configured cap for 5m. The MM is still unwinding, but is not providing normal two-sided liquidity."

      - alert: PolymarketMarketMakerPairedInventoryStuck
        expr: |
          min_over_time(sybil_polymarket_mm_paired_position_units[15m]) > 1000000
          and
          delta(sybil_polymarket_mm_paired_position_units[15m]) >= 0
        for: 5m
        labels:
          severity: warning
          component: polymarket
        annotations:
          summary: "Polymarket MM complete-set inventory is not draining"
          description: "More than 1,000 redeemable YES+NO shares have persisted without a net decrease over 15m. Check compaction submission failures, ordinary IOC admission, and settlement."

      - alert: PolymarketMarketMakerQuoteCapacityLimited
        expr: sybil_polymarket_mm_quote_capacity_limited == 1
        for: 2m
        labels:
          severity: warning
          component: polymarket
        annotations:
          summary: "Polymarket MM is rotating partial market coverage"
          description: "The mirror MM order cap is omitting eligible markets from each quote cycle. Raise measured capacity or reduce the configured universe."

      - alert: ReferencePriceFeedStale
        expr: |
          max(sybil_reference_prices_total) > 0
          and
          max(sybil_reference_prices_age_seconds) > 180
        for: 3m
        labels:
          severity: critical
          component: polymarket
        annotations:
          summary: "Polymarket reference prices are stale"
          description: "The API has not received a reference-price update for more than 3m. The mirror, Polymarket feed, or API reference-price endpoint may be broken."

      - alert: ReferencePriceFeedMissing
        expr: max(sybil_reference_prices_active_total) == 0
        for: 3m
        labels:
          severity: critical
          component: polymarket
        annotations:
          summary: "Polymarket reference-price feed is empty"
          description: "No active Polymarket reference price has been present for 3m. The curated feed, mirror process, or API update path is broken."

      - alert: ReferencePriceTokensExpired
        expr: max(sybil_reference_prices_expired_total) > 0
        for: 2m
        labels:
          severity: warning
          component: polymarket
        annotations:
          summary: "One or more reference-price tokens expired"
          description: "At least one stored reference price exceeded the API per-market TTL for 2m (expired tokens: {{ $value }}). Public market reads now omit those values, and Arena reference-required selection cannot use them."

      - alert: SybilPriceDivergenceHigh
        expr: |
          count(
            (sybil_price_reference_diff_nanos > 250 * 1000 * 1000)
            and on(market_id)
            (sybil_reference_price_available == 1)
            and on(market_id)
            (increase(sybil_market_fills_total[30m]) > 0)
          ) >= 3
        for: 30m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Sybil prices diverge from Polymarket"
          description: "At least 3 recently filled Sybil markets are more than 25 cents away from Polymarket references for 30m. Single-market divergence remains visible in Grafana without paging Telegram."

      - alert: SybilPriceDivergenceBroad
        expr: |
          count(
            sybil_price_reference_diff_nanos
            and on(market_id)
            (sybil_reference_price_available == 1)
            and on(market_id)
            (increase(sybil_market_fills_total[30m]) > 0)
          ) >= 20
          and
          avg(
            sybil_price_reference_diff_nanos
            and on(market_id)
            (sybil_reference_price_available == 1)
            and on(market_id)
            (increase(sybil_market_fills_total[30m]) > 0)
          ) > 50 * 1000 * 1000
        for: 30m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Average Sybil/Polymarket price divergence is high"
          description: "Average absolute price difference across at least 20 recently filled Sybil markets with reference prices is above 5 cents for 30m. Smaller divergence remains visible in Grafana without paging Telegram."

      - alert: SybilPricedMarketCoverageLow
        expr: |
          max(sybil_markets_active_total) > 100
          and
          max(sybil_markets_priced_total) < 10
        for: 10m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Few active markets have Sybil clearing prices"
          description: "The deployment has many active markets but fewer than 10 markets with local prices. The market maker or trader activity may be too narrow."

      - alert: SybilPriceReferenceIntersectionLow
        expr: |
          max(sybil_reference_prices_active_total) >= 1
          and
          max(sybil_markets_priced_total) >= 1
          and
          max(sybil_price_reference_pairs_total) < 1
        for: 10m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Sybil prices do not overlap Polymarket references"
          description: "Sybil has both local prices and a live curated Polymarket feed, but no market is in their intersection. Price-comparison monitoring is blind."

      - alert: BlockProductionStalled
        expr: rate(sybil_blocks_produced[2m]) == 0 and up{job="sybil-api"} == 1
        for: 2m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "No blocks produced in the last 2m"
          description: "sybil-api is up but has not produced any blocks for 2m — block production may be stalled."

      - alert: DepositQuarantineLedgerGrowing
        expr: increase(sybil_quarantine_ledger_size[1h]) > 100
        for: 10m
        labels:
          severity: info
          component: l1-indexer
        annotations:
          summary: "Deposit quarantine ledger is growing"
          description: "More than 100 new unresolved bridge keys accumulated over 1h (growth: {{ $value }} entries). Quarantining is working as designed, but sustained growth should be investigated."

      - alert: L1DepositPipelineStalled
        expr: |
          sum(increase(sybil_http_requests_total{
            path="/v1/bridge/deposits",
            status=~"5.."
          }[10m])) > 0
        for: 2m
        labels:
          severity: warning
          component: l1-indexer
        annotations:
          summary: "L1 deposit pipeline is stalled"
          description: "The service-tier deposit submit path returned a server error. Unlike an unresolved-key 404, this is not a quarantine disposition and the gapless indexer will retry the head deposit."

      - alert: L1IndexerFatalFailure
        # Fatal counters are absolute rather than increase(): cold-start cursor
        # failures first appear at 1 and have no previously scraped zero.
        expr: |
          sum by (kind) (
            sybil_l1_indexer_fatal_failures_total
          ) > 0
        for: 0m
        labels:
          severity: critical
          component: l1-indexer
        annotations:
          summary: "L1 indexer entered fail-stop mode"
          description: "The L1 indexer is serving metrics only after a fatal integrity failure (kind={{ $labels.kind }}). Preserve the cursor/store evidence, stop bridge-dependent writes, and do not clear or edit the cursor."
          runbook_url: "https://github.com/MetaB0y/sybil/blob/main/docs/runbooks/l1-reorg-recovery.md#indexer-alerts-and-diagnosis"

      - alert: L1IndexerNotReady
        expr: sybil_l1_indexer_ready == 0
        for: 1m
        labels:
          severity: critical
          component: l1-indexer
        annotations:
          summary: "L1 indexer is not ready"
          description: "The indexer metrics listener is reachable but ingestion has remained unready for 1m. Check the fatal counter and /healthz before restarting anything."
          runbook_url: "https://github.com/MetaB0y/sybil/blob/main/docs/runbooks/l1-reorg-recovery.md#indexer-alerts-and-diagnosis"

      - alert: L1IndexerRpcFailureBurst
        # This process-local gauge is scrape-safe on its first observation and
        # resets on the next successful poll.
        expr: sybil_l1_indexer_consecutive_rpc_failures >= 3
        for: 0m
        labels:
          severity: critical
          component: l1-indexer
        annotations:
          summary: "L1 indexer RPC failures are consecutive"
          description: "At least three consecutive L1 RPC polls failed (current streak: {{ $value }}). Treat provider unavailability or equivocation as a bridge-integrity incident; do not bypass the configured endpoint policy."
          runbook_url: "https://github.com/MetaB0y/sybil/blob/main/docs/runbooks/l1-reorg-recovery.md#indexer-alerts-and-diagnosis"

      - alert: L1IndexerConfirmedLagHigh
        expr: sybil_l1_indexer_confirmed_lag_blocks > 64
        for: 10m
        labels:
          severity: warning
          component: l1-indexer
        annotations:
          summary: "L1 indexer is behind the authenticated source tip"
          description: "The durable L1 checkpoint has remained more than 64 authenticated source-prefix blocks behind for 10m (current lag: {{ $value }} blocks). Check every provider, API failures, and cursor persistence before the backlog grows."
          runbook_url: "https://github.com/MetaB0y/sybil/blob/main/docs/runbooks/l1-reorg-recovery.md#indexer-alerts-and-diagnosis"

      - alert: SyntheticProbeFailed
        expr: last_over_time(sybil_synthetic_probe_failure{job="sybil-synthetic"}[10m]) == 1
        for: 0m
        labels:
          severity: critical
          component: synthetic-monitor
        annotations:
          summary: "External Sybil synthetic probe failed"
          description: "The five-minute read-only probe failed for {{ $labels.instance }}. Health, block advancement, markets, CORS, or container health is broken; inspect the systemd journal for the one-line cause."

      - alert: SyntheticProbeMissing
        expr: absent_over_time(sybil_synthetic_probe_failure{job="sybil-synthetic"}[15m]) == 1
        for: 0m
        labels:
          severity: warning
          component: synthetic-monitor
        annotations:
          summary: "Sybil synthetic probe has stopped reporting"
          description: "No synthetic result reached VictoriaMetrics for 15m. Check the sybil-synthetic-probe timer, Docker access, and VictoriaMetrics ingestion."

      - alert: SyntheticProofLagHigh
        expr: |
          last_over_time(sybil_synthetic_proof_lag_blocks{job="sybil-synthetic"}[15m])
          > on(job, instance)
          last_over_time(sybil_synthetic_proof_lag_limit_blocks{job="sybil-synthetic"}[15m])
        for: 10m
        labels:
          severity: warning
          component: prover
        annotations:
          summary: "Proof pipeline is lagging the chain head"
          description: "The synthetic probe measured /proofs/latest beyond its configured lag limit for {{ $labels.instance }} (current lag: {{ $value }} blocks). The prover or mock-prover pipeline is likely wedged; see the proof-lag section of the synthetic-monitoring runbook."

      - alert: ActorMailboxQueueHigh
        expr: max_over_time(sybil_actor_queue_depth[2m]) > 1000
        for: 2m
        labels:
          severity: warning
          component: sequencer
        annotations:
          summary: "Actor mailbox queue depth is high"
          description: "{{ $labels.actor }} mailbox queue depth has exceeded 1000 for 2m (current depth: {{ $value }})."

      - alert: ActorMailboxQueueCritical
        expr: max_over_time(sybil_actor_queue_depth[1m]) > 5000
        for: 1m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Actor mailbox queue depth is critical"
          description: "{{ $labels.actor }} mailbox queue depth has exceeded 5000 for 1m (current depth: {{ $value }})."

      - alert: StoreQmdbRootMismatch
        expr: increase(sybil_store_qmdb_root_mismatch_total[10m]) > 0
        for: 0m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Typed qMDB root invariant mismatch"
          description: "The sequencer observed a typed qMDB root mismatch. If this is not immediately followed by a successful repair during restart, persistence is unsafe."

      - alert: StoreQmdbRepairFailed
        expr: increase(sybil_store_qmdb_repair_total{result="failed"}[10m]) > 0
        for: 0m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Typed qMDB root repair failed"
          description: "The sequencer failed to repair the fenced typed-state qMDB root from redb. The API should refuse startup or block commit."

      - alert: AcknowledgedWriteRestoreFailure
        # Cold-start recovery exposes this series for the first time at 1, so
        # increase() would miss the incident without a previously scraped zero.
        # Keep the page latched until a clean process restart resets the metric.
        expr: |
          sum by (kind) (
            sybil_restore_acknowledged_write_failures_total
          ) > 0
        for: 0m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Acknowledged-write restore failed"
          description: "The sequencer rejected its durable acknowledged-write suffix (kind={{ $labels.kind }}). Preserve the store and stop writes; never bypass, edit, or discard the failed row."
          runbook_url: "https://github.com/MetaB0y/sybil/blob/main/docs/runbooks/store-backup-restore.md#acknowledged-write-restore-failure"

      - alert: PersistenceFailing
        expr: increase(sybil_persistence_failures[5m]) > 0
        for: 0m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Block persistence is failing"
          description: "The sequencer failed to persist at least one prepared block in the last 5m (e.g. a wedged redb). Blocks keep producing in memory while durable state stalls, so a restart would lose the unpersisted tail."

      - alert: SybilApiMemoryHigh
        expr: sybil_process_resident_memory_bytes > 650 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
          component: sequencer
        annotations:
          summary: "sybil-api memory usage is high"
          description: "sybil-api RSS has been above 650 MiB for 5m (current: {{ $value | humanize1024 }}B)."

      - alert: SybilApiMemoryCritical
        expr: sybil_process_resident_memory_bytes > 800 * 1024 * 1024
        for: 2m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "sybil-api memory is near its container limit"
          description: "sybil-api RSS is above 800 MiB on a host where the current container limit is 1.25 GiB; global host pressure may kill it before the cgroup limit (current: {{ $value | humanize1024 }}B)."

      - alert: SybilApiMemoryGrowingFast
        expr: |
          deriv(sybil_process_resident_memory_bytes[30m]) * 3600 > 32 * 1024 * 1024
          and on(job, instance)
          changes(sybil_recent_block_cache_len[5m]) == 0
        for: 30m
        labels:
          severity: warning
          component: sequencer
        annotations:
          summary: "sybil-api RSS is growing persistently"
          description: "After the recent-block cache finished warming, RSS grew faster than 32 MiB/hour for 30m. Correlate the archive, outbox, actor queue, and workload panels before a high absolute-memory alert fires."

      - alert: HostMemoryLow
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Host memory is low"
          description: "Available host memory has been below 10% for 10m (current ratio: {{ $value | humanizePercentage }})."

      - alert: HostDiskSpaceLow
        expr: |
          node_filesystem_avail_bytes{job="node",mountpoint="/",fstype!~"tmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes{job="node",mountpoint="/",fstype!~"tmpfs|overlay|squashfs"}
          < 0.15
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Host root filesystem space is low"
          description: "Available space on the root filesystem has been below 15% for 10m (current ratio: {{ $value | humanizePercentage }}). Sequencer and history Docker volumes share this filesystem; inspect outbox/history/archive growth before redb writes fail."

      - alert: HostDiskSpaceCritical
        expr: |
          node_filesystem_avail_bytes{job="node",mountpoint="/",fstype!~"tmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes{job="node",mountpoint="/",fstype!~"tmpfs|overlay|squashfs"}
          < 0.05
        for: 2m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Host root filesystem is nearly full"
          description: "Available space on the root filesystem is below 5% (current ratio: {{ $value | humanizePercentage }}). Preserve the stores and stop discretionary writers; do not delete product-history outbox rows without a verified durable sink."

      - alert: HostSwapHigh
        expr: |
          node_memory_SwapTotal_bytes > 0
          and
          (
            (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes)
            / node_memory_SwapTotal_bytes
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Host swap usage is high"
          description: "More than half of host swap is in use. This often precedes scrape timeouts and SSH/API stalls."

      - alert: HostMemoryPressureStalled
        expr: rate(node_pressure_memory_stalled_seconds_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Host is stalling on memory pressure"
          description: "Full memory-pressure stalls consumed more than 5% of wall time for 5m. Scrapes and actor queues may become misleading after this point; shed load or add memory."

      - alert: HostOomKill
        expr: increase(node_vmstat_oom_kill[10m]) > 0
        for: 0m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "The kernel killed a process for out-of-memory"
          description: "node_vmstat_oom_kill increased. Inspect the kernel journal and the Grafana resource panels immediately; container health can remain stale after a global OOM kill."

      - alert: HostCpuHigh
        expr: 1 - avg by (instance, job) (rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.85
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Host CPU usage is high"
          description: "Host CPU has averaged above 85% for 10m (current: {{ $value | humanizePercentage }})."

      - alert: HostLoadVeryHigh
        expr: |
          node_load1
          / count by (instance, job) (node_cpu_seconds_total{mode="idle"})
          > 4
        for: 5m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Host load is very high"
          description: "1m load per CPU is above 4 for 5m. The VM may be approaching the zombie state where TCP accepts but services do not respond."

      - alert: ArenaDatabaseUnavailable
        expr: sybil_bot_db_available == 0
        for: 5m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Arena database is unavailable"
          description: "sybil-api cannot read the Arena portfolio database, so bot order/fill dashboards are unavailable."

      - alert: ArenaNoMarketsSelected
        expr: max(sybil_arena_selected_markets) == 0
        for: 15m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Arena selected no markets to trade"
          description: "The live arena runner has held zero selected markets for 15m. Market discovery, the mirror, or the selection profile may be broken, so no bot has anything to trade."

      - alert: ArenaNoReferenceMarketsSelected
        expr: |
          max(sybil_arena_selected_markets) > 0
          and
          max(sybil_arena_selected_reference_markets) == 0
        for: 15m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "No selected arena market has a reference price"
          description: "The arena selected markets, but none carry an external Polymarket reference price for 15m. Edge estimation degrades to yes_price only; the mirror may not be publishing references."

      - alert: ArenaSyntheticCoverageLow
        expr: |
          max(sybil_markets_active_total) >= 20
          and
          max(sybil_arena_synthetic_markets)
            < 0.9 * max(sybil_markets_active_total)
        for: 15m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Arena synthetic flow covers too little of the live market universe"
          description: "The selected synthetic cohort is below 90% of active outcome rows for 15m. A stale selection cap, lifecycle filter, or missing market provenance may be leaving most product markets inert."

      - alert: ArenaSyntheticNoiseStalled
        expr: |
          max(sybil_arena_synthetic_markets) > 0
          and
          sum(increase(sybil_bot_total_orders{trader=~"Noise-.+"}[10m])) < 1
        for: 15m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Arena synthetic noise stopped submitting orders"
          description: "Arena selected a synthetic market cohort but noise-trader order totals have not increased for 15m. Check actor tasks, pending order lifetime, balances, and block-stream progress; selection coverage alone does not prove live flow."

      - alert: NewsFeedStale
        expr: |
          max(sybil_news_feed_latest_poll_success_timestamp_seconds) > 0
          and
          (time() - max(sybil_news_feed_latest_poll_success_timestamp_seconds)) > 900
        for: 5m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Arena news feed has not completed a poll recently"
          description: "The arena news feed last completed a successful poll more than 15m ago (default poll interval is 5m, so ~3 cycles have been missed). Polling may be wedged on RSS or Polymarket fetches."

      - alert: NewsFeedPollErrors
        expr: increase(sybil_news_feed_poll_errors_total[15m]) >= 3
        for: 5m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Arena news feed polls are erroring"
          description: "At least 3 arena news feed poll cycles have raised in the last 15m. Upstream RSS, the LLM gate, or Polymarket price fetches may be failing."

      - alert: ArenaLlmProviderAuthOrCreditRejected
        expr: |
          sum(
            increase(
              sybil_arena_llm_provider_failures_total{
                kind=~"authentication|credit"
              }[10m]
            )
          ) > 0
        for: 0m
        labels:
          severity: critical
          component: arena
        annotations:
          summary: "Arena LLM provider rejected authentication or credit"
          description: "An Arena relevance-gate or analyst call received HTTP 401/402 in the last 10m. Synthetic trading may remain healthy while the LLM product capability is degraded; local experiment budget does not represent provider credit."

      - alert: ArenaLlmProviderDegraded
        expr: max(sybil_arena_llm_provider_degraded) > 0
        for: 5m
        labels:
          severity: warning
          component: arena
        annotations:
          summary: "Arena LLM provider capability remains degraded"
          description: "At least one Arena relevance-gate or analyst caller has not recovered from its latest provider failure for 5m. Inspect failure classification, last-success, and backoff metrics."

      - alert: ProverDown
        expr: up{job="sybil-prover"} == 0
        for: 2m
        labels:
          severity: warning
          component: prover
        annotations:
          summary: "sybil-prover scrape target is down"
          description: "VictoriaMetrics has not been able to scrape sybil-prover for 2m."

      - alert: ProofJobRetentionMaintenanceFailed
        # Absolute so a first-scrape failure is not lost for lack of a prior
        # zero sample. The counter resets only with a clean API process.
        expr: sybil_acknowledged_proof_job_maintenance_failures_total > 0
        for: 0m
        labels:
          severity: critical
          component: sequencer
        annotations:
          summary: "Acknowledged proof-job retention failed closed"
          description: "The sequencer retained all source rows after proof-job maintenance failed. Inspect digest integrity and redb health before changing retention or deleting data."
          runbook_url: "https://github.com/MetaB0y/sybil/blob/main/docs/runbooks/prover-daemon.md#source-retention-and-ownership"

      - alert: ProverInactive
        expr: |
          max(sybil_prover_artifact_directories_total) == 0
          and
          sum(rate(sybil_blocks_produced[5m])) > 0
        for: 30m
        labels:
          severity: warning
          component: prover
        annotations:
          summary: "Prover has not prepared any artifacts"
          description: "Blocks are being produced, but the durable prover has no proven epoch. Check source pull/ack, epoch assembly, and backend state."

      - alert: ProverArtifactStoreUnreadable
        expr: sybil_prover_artifact_store_ready == 0
        for: 2m
        labels:
          severity: critical
          component: prover
        annotations:
          summary: "Prover artifact store is unreadable"
          description: "sybil-prover is up, but its artifact store cannot be scanned."

      - alert: ProverLagHigh
        expr: |
          (
            max(sybil_block_height)
            - max(sybil_prover_latest_prepared_height)
          ) > 10
          and
          max(sybil_prover_artifact_directories_total) > 0
        for: 5m
        labels:
          severity: warning
          component: prover
        annotations:
          summary: "Prover is lagging sequencer blocks"
          description: "The latest prepared proof artifact is more than 10 blocks behind the sequencer (current lag: {{ $value }} blocks)."

      - alert: ProverArtifactStale
        expr: |
          (time() - max(sybil_prover_latest_updated_at_seconds)) > 300
          and
          max(sybil_prover_artifact_directories_total) > 0
          and
          sum(rate(sybil_blocks_produced[5m])) > 0
        for: 5m
        labels:
          severity: warning
          component: prover
        annotations:
          summary: "Prover artifacts are stale"
          description: "The prover has not updated any artifact for more than 5m while blocks are still being produced."

      - alert: ProverJobQueueHigh
        expr: sybil_prover_jobs_queued > 20
        for: 5m
        labels:
          severity: warning
          component: prover
        annotations:
          summary: "Prover job queue is high"
          description: "More than 20 ingested blocks are beyond the proven frontier (current queue depth: {{ $value }})."

      - alert: ProverProofFailed
        expr: sybil_prover_artifacts_total{proof_status=~"failed|error"} > 0
        for: 1m
        labels:
          severity: critical
          component: prover
        annotations:
          summary: "A prover artifact is marked failed"
          description: "At least one prover artifact has proof_status={{ $labels.proof_status }}."

      - alert: SequencerAccountStockGrowingFast
        expr: delta(sybil_state_accounts_total[15m]) > 100
        for: 5m
        labels:
          severity: warning
          component: sequencer
        annotations:
          summary: "Committed account stock is growing unusually fast"
          description: "More than 100 accounts were added over 15m (growth: {{ $value }}). Every account recurs in later full-state witnesses; check onboarding traffic and the public account-creation boundary. See docs/runbooks/resource-liveness.md."

      - alert: PublicAccountCapacityLow
        expr: (sybil_public_account_remaining / sybil_public_account_capacity <= 0.1) and sybil_public_account_remaining > 0
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Public onboarding account stock is nearly exhausted"
          description: "At most 10% of the configured lifetime public account stock remains. Account ids are permanent and are not reclaimed; plan an explicit policy change or direct users to reconnect existing accounts. See docs/runbooks/resource-liveness.md."

      - alert: PublicAccountCapacityExhausted
        expr: sybil_public_account_remaining == 0 and sybil_public_account_capacity > 0
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Public onboarding account stock is exhausted"
          description: "No lifetime public account allocations remain. Anonymous onboarding now returns PUBLIC_ACCOUNT_CAPACITY_EXHAUSTED; account ids are not reclaimed automatically. See docs/runbooks/resource-liveness.md."

      - alert: ProductHistoryOutboxStale
        expr: |
          sybil_product_history_outbox_oldest_age_seconds > 900
          and sybil_product_history_outbox_backlog_rows > 0
        for: 5m
        labels:
          severity: warning
          component: history
        annotations:
          summary: "Product-history source outbox is stale"
          description: "The oldest unacknowledged product-history batch has been at least 15m old for 5m (current age: {{ $value | humanizeDuration }}). Check projector health, credentials, network, redb writes, and disk capacity; trading continues while this backlog consumes sequencer disk. See docs/runbooks/resource-liveness.md."

      - alert: ProductHistoryOutboxLarge
        expr: sybil_product_history_outbox_payload_bytes > 256 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
          component: history
        annotations:
          summary: "Product-history source outbox is large"
          description: "Encoded product-history payloads retained in the sequencer outbox exceed 256 MiB (current: {{ $value | humanize1024 }}B), excluding redb page overhead. Restore projector throughput before shared-host disk pressure threatens canonical persistence. See docs/runbooks/resource-liveness.md."

      - alert: WitnessPayloadLarge
        expr: max(sybil_witness_payload_bytes{quantile="0.99"}) > 8 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
          component: da
        annotations:
          summary: "Canonical witness payload exceeds the devnet early-warning threshold"
          description: "Rolling p99 witness payload size has exceeded 8 MiB for 5m (current p99: {{ $value | humanize1024 }}B). At a 10s cadence, retaining 8 MiB every block is roughly 68 GiB/day before database overhead. See docs/runbooks/resource-liveness.md."

      - alert: DaArtifactWriteBacklog
        expr: sybil_da_artifact_writes_in_flight > 2
        for: 2m
        labels:
          severity: warning
          component: da
        annotations:
          summary: "DA artifact writes are falling behind block production"
          description: "More than two post-commit DA artifact writes have remained in flight for 2m (current: {{ $value }}). Blocks may continue committing while retained witness availability falls behind. See docs/runbooks/resource-liveness.md."
