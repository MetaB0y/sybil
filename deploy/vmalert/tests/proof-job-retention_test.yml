# Prometheus-compatible tests for acknowledged proof-job source retention.
# Run: promtool test rules deploy/vmalert/tests/proof-job-retention_test.yml

rule_files:
  - ../rules.yml

evaluation_interval: 1m

tests:
  - name: first observed maintenance failure pages and clean restart recovers
    interval: 1m
    input_series:
      - series: 'sybil_acknowledged_proof_job_maintenance_failures_total{job="sybil-api",instance="sybil-api:3000"}'
        values: "1 0"
    alert_rule_test:
      - eval_time: 0m
        alertname: ProofJobRetentionMaintenanceFailed
        exp_alerts:
          - exp_labels:
              job: sybil-api
              instance: sybil-api:3000
              severity: critical
              component: sequencer
            exp_annotations:
              summary: "Acknowledged proof-job retention failed closed"
              description: "The sequencer retained all source rows after proof-job maintenance failed. Inspect digest integrity and redb health before changing retention or deleting data."
              runbook_url: "https://github.com/MetaB0y/sybil/blob/main/docs/runbooks/prover-daemon.md#source-retention-and-ownership"
      - eval_time: 1m
        alertname: ProofJobRetentionMaintenanceFailed
        exp_alerts: []
