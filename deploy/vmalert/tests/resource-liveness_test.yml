# Prometheus-compatible tests for the devnet resource/liveness alerts.
# Run: promtool test rules deploy/vmalert/tests/resource-liveness_test.yml

rule_files:
  - ../rules.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'sybil_process_resident_memory_bytes{job="sybil-api",instance="sybil-api:3000"}'
        values: "419430400+2097152x40"
    alert_rule_test:
      - eval_time: 29m
        alertname: SybilApiMemoryGrowingFast
        exp_alerts: []
      - eval_time: 31m
        alertname: SybilApiMemoryGrowingFast
        exp_alerts:
          - exp_labels:
              job: "sybil-api"
              instance: "sybil-api:3000"
              severity: warning
              component: sequencer
            exp_annotations:
              summary: "sybil-api RSS is growing persistently"
              description: "RSS has grown faster than 32 MiB/hour for 30m. Correlate the recent-history cache, archive, outbox, actor queue, and workload panels before a high absolute-memory alert fires."

  - interval: 1m
    input_series:
      - series: 'node_vmstat_oom_kill{job="node",instance="node-exporter:9100"}'
        values: "0+0x4 1+0x10"
    alert_rule_test:
      - eval_time: 3m
        alertname: HostOomKill
        exp_alerts: []
      - eval_time: 6m
        alertname: HostOomKill
        exp_alerts:
          - exp_labels:
              job: "node"
              instance: "node-exporter:9100"
              severity: critical
              component: host
            exp_annotations:
              summary: "The kernel killed a process for out-of-memory"
              description: "node_vmstat_oom_kill increased. Inspect the kernel journal and the Grafana resource panels immediately; container health can remain stale after a global OOM kill."

  - interval: 1m
    input_series:
      - series: 'node_filesystem_avail_bytes{job="node",instance="node-exporter:9100",mountpoint="/",fstype="ext4"}'
        values: "14000000000+0x12"
      - series: 'node_filesystem_size_bytes{job="node",instance="node-exporter:9100",mountpoint="/",fstype="ext4"}'
        values: "100000000000+0x12"
    alert_rule_test:
      - eval_time: 9m
        alertname: HostDiskSpaceLow
        exp_alerts: []
      - eval_time: 11m
        alertname: HostDiskSpaceLow
        exp_alerts:
          - exp_labels:
              job: "node"
              instance: "node-exporter:9100"
              mountpoint: "/"
              fstype: "ext4"
              severity: warning
              component: host
            exp_annotations:
              summary: "Host root filesystem space is low"
              description: "Available space on the root filesystem has been below 15% for 10m (current ratio: 14%). Sequencer and history Docker volumes share this filesystem; inspect outbox/history/archive growth before redb writes fail."

  - interval: 1m
    input_series:
      - series: 'node_filesystem_avail_bytes{job="node",instance="node-exporter:9100",mountpoint="/",fstype="ext4"}'
        values: "4000000000+0x5"
      - series: 'node_filesystem_size_bytes{job="node",instance="node-exporter:9100",mountpoint="/",fstype="ext4"}'
        values: "100000000000+0x5"
    alert_rule_test:
      - eval_time: 1m
        alertname: HostDiskSpaceCritical
        exp_alerts: []
      - eval_time: 3m
        alertname: HostDiskSpaceCritical
        exp_alerts:
          - exp_labels:
              job: "node"
              instance: "node-exporter:9100"
              mountpoint: "/"
              fstype: "ext4"
              severity: critical
              component: host
            exp_annotations:
              summary: "Host root filesystem is nearly full"
              description: "Available space on the root filesystem is below 5% (current ratio: 4%). Preserve the stores and stop discretionary writers; do not delete product-history outbox rows without a verified durable sink."

  - interval: 1m
    input_series:
      - series: 'sybil_state_accounts_total{job="sybil-api",instance="sybil-api:3000"}'
        values: "0+0x10 0+10x20"
    alert_rule_test:
      - eval_time: 20m
        alertname: SequencerAccountStockGrowingFast
        exp_alerts: []
      - eval_time: 28m
        alertname: SequencerAccountStockGrowingFast
        exp_alerts:
          - exp_labels:
              job: "sybil-api"
              instance: "sybil-api:3000"
              severity: warning
              component: sequencer
            exp_annotations:
              summary: "Committed account stock is growing unusually fast"
              description: "More than 100 accounts were added over 15m (growth: 150). Every account recurs in later full-state witnesses; check onboarding traffic and the public account-creation boundary. See docs/runbooks/resource-liveness.md."

  - interval: 1m
    input_series:
      - series: 'sybil_state_accounts_total{job="sybil-api",instance="sybil-api:3000"}'
        values: "0+5x30"
    alert_rule_test:
      - eval_time: 30m
        alertname: SequencerAccountStockGrowingFast
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'sybil_public_account_capacity{job="sybil-api",instance="sybil-api:3000"}'
        values: "1000+0x15"
      - series: 'sybil_public_account_remaining{job="sybil-api",instance="sybil-api:3000"}'
        values: "1000+0x4 50+0x10"
    alert_rule_test:
      - eval_time: 8m
        alertname: PublicAccountCapacityLow
        exp_alerts: []
      - eval_time: 10m
        alertname: PublicAccountCapacityLow
        exp_alerts:
          - exp_labels:
              job: "sybil-api"
              instance: "sybil-api:3000"
              severity: warning
              component: api
            exp_annotations:
              summary: "Public onboarding account stock is nearly exhausted"
              description: "At most 10% of the configured lifetime public account stock remains. Account ids are permanent and are not reclaimed; plan an explicit policy change or direct users to reconnect existing accounts. See docs/runbooks/resource-liveness.md."

  - interval: 1m
    input_series:
      - series: 'sybil_public_account_capacity{job="sybil-api",instance="sybil-api:3000"}'
        values: "1000+0x8"
      - series: 'sybil_public_account_remaining{job="sybil-api",instance="sybil-api:3000"}'
        values: "0+0x8"
    alert_rule_test:
      - eval_time: 1m
        alertname: PublicAccountCapacityExhausted
        exp_alerts: []
      - eval_time: 3m
        alertname: PublicAccountCapacityExhausted
        exp_alerts:
          - exp_labels:
              job: "sybil-api"
              instance: "sybil-api:3000"
              severity: critical
              component: api
            exp_annotations:
              summary: "Public onboarding account stock is exhausted"
              description: "No lifetime public account allocations remain. Anonymous onboarding now returns PUBLIC_ACCOUNT_CAPACITY_EXHAUSTED; account ids are not reclaimed automatically. See docs/runbooks/resource-liveness.md."

  - interval: 1m
    input_series:
      - series: 'sybil_product_history_outbox_backlog_rows{job="sybil-api",instance="sybil-api:3000"}'
        values: "100+0x8"
      - series: 'sybil_product_history_outbox_oldest_age_seconds{job="sybil-api",instance="sybil-api:3000"}'
        values: "1200+0x8"
    alert_rule_test:
      - eval_time: 4m
        alertname: ProductHistoryOutboxStale
        exp_alerts: []
      - eval_time: 6m
        alertname: ProductHistoryOutboxStale
        exp_alerts:
          - exp_labels:
              job: "sybil-api"
              instance: "sybil-api:3000"
              severity: warning
              component: history
            exp_annotations:
              summary: "Product-history source outbox is stale"
              description: "The oldest unacknowledged product-history batch has been at least 15m old for 5m (current age: 20m 0s). Check projector health, credentials, network, redb writes, and disk capacity; trading continues while this backlog consumes sequencer disk. See docs/runbooks/resource-liveness.md."

  - interval: 1m
    input_series:
      - series: 'sybil_product_history_outbox_payload_bytes{job="sybil-api",instance="sybil-api:3000"}'
        values: "314572800+0x8"
    alert_rule_test:
      - eval_time: 4m
        alertname: ProductHistoryOutboxLarge
        exp_alerts: []
      - eval_time: 6m
        alertname: ProductHistoryOutboxLarge
        exp_alerts:
          - exp_labels:
              job: "sybil-api"
              instance: "sybil-api:3000"
              severity: warning
              component: history
            exp_annotations:
              summary: "Product-history source outbox is large"
              description: "Encoded product-history payloads retained in the sequencer outbox exceed 256 MiB (current: 300MiB), excluding redb page overhead. Restore projector throughput before shared-host disk pressure threatens canonical persistence. See docs/runbooks/resource-liveness.md."

  - interval: 1m
    input_series:
      - series: 'sybil_witness_payload_bytes{quantile="0.99",job="sybil-api",instance="sybil-api:3000"}'
        values: "9437184+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: WitnessPayloadLarge
        exp_alerts: []
      - eval_time: 6m
        alertname: WitnessPayloadLarge
        exp_alerts:
          - exp_labels:
              severity: warning
              component: da
            exp_annotations:
              summary: "Canonical witness payload exceeds the devnet early-warning threshold"
              description: "Rolling p99 witness payload size has exceeded 8 MiB for 5m (current p99: 9MiB). At a 10s cadence, retaining 8 MiB every block is roughly 68 GiB/day before database overhead. See docs/runbooks/resource-liveness.md."

  - interval: 1m
    input_series:
      - series: 'sybil_witness_payload_bytes{quantile="0.99",job="sybil-api",instance="sybil-api:3000"}'
        values: "4194304+0x10"
      - series: 'sybil_da_artifact_writes_in_flight{job="sybil-api",instance="sybil-api:3000"}'
        values: "1+0x10"
    alert_rule_test:
      - eval_time: 8m
        alertname: WitnessPayloadLarge
        exp_alerts: []
      - eval_time: 8m
        alertname: DaArtifactWriteBacklog
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'sybil_da_artifact_writes_in_flight{job="sybil-api",instance="sybil-api:3000"}'
        values: "3+0x6"
    alert_rule_test:
      - eval_time: 1m
        alertname: DaArtifactWriteBacklog
        exp_alerts: []
      - eval_time: 3m
        alertname: DaArtifactWriteBacklog
        exp_alerts:
          - exp_labels:
              job: "sybil-api"
              instance: "sybil-api:3000"
              severity: warning
              component: da
            exp_annotations:
              summary: "DA artifact writes are falling behind block production"
              description: "More than two post-commit DA artifact writes have remained in flight for 2m (current: 3). Blocks may continue committing while retained witness availability falls behind. See docs/runbooks/resource-liveness.md."
