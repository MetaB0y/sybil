# Prometheus-compatible tests for Arena and curated reference liveness. Run:
#   promtool test rules deploy/vmalert/tests/arena-liveness_test.yml

rule_files:
  - ../rules.yml

evaluation_interval: 1m

tests:
  # A labelled counter does not exist until the first failure. The per-kind
  # failure timestamp therefore owns the first and only non-retryable provider
  # rejection even when its series is born on that failure's first scrape.
  - interval: 1m
    input_series:
      - series: 'sybil_arena_llm_provider_last_failure_timestamp_seconds{component="news-gate",kind="credit"}'
        values: "_ 60+0x11"
    alert_rule_test:
      - eval_time: 2m
        alertname: ArenaLlmProviderAuthOrCreditRejected
        exp_alerts:
          - exp_labels:
              severity: critical
              component: arena
            exp_annotations:
              summary: "Arena LLM provider rejected authentication or credit"
              description: "An Arena relevance-gate or analyst call received HTTP 401/402 in the last 10m. Synthetic trading may remain healthy while the LLM product capability is degraded; local experiment budget does not represent provider credit."
      - eval_time: 12m
        alertname: ArenaLlmProviderAuthOrCreditRejected
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'sybil_arena_llm_provider_last_failure_timestamp_seconds{component="analyst",kind="authentication"}'
        values: "0 60+0x10"
    alert_rule_test:
      - eval_time: 2m
        alertname: ArenaLlmProviderAuthOrCreditRejected
        exp_alerts:
          - exp_labels:
              severity: critical
              component: arena
            exp_annotations:
              summary: "Arena LLM provider rejected authentication or credit"
              description: "An Arena relevance-gate or analyst call received HTTP 401/402 in the last 10m. Synthetic trading may remain healthy while the LLM product capability is degraded; local experiment budget does not represent provider credit."

  - interval: 1m
    input_series:
      - series: 'sybil_arena_llm_provider_degraded{component="news-gate"}'
        values: "1+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: ArenaLlmProviderDegraded
        exp_alerts: []
      - eval_time: 6m
        alertname: ArenaLlmProviderDegraded
        exp_alerts:
          - exp_labels:
              severity: warning
              component: arena
            exp_annotations:
              summary: "Arena LLM provider capability remains degraded"
              description: "At least one Arena relevance-gate or analyst caller has not recovered from its latest provider failure for 5m. Inspect failure classification, last-success, and backoff metrics."

  - interval: 1m
    input_series:
      - series: 'up{job="sybil-arena",instance="sybil-arena:9101"}'
        values: "0+0x5"
    alert_rule_test:
      - eval_time: 2m
        alertname: ArenaDown
        exp_alerts: []
      - eval_time: 4m
        alertname: ArenaDown
        exp_alerts:
          - exp_labels:
              job: "sybil-arena"
              instance: "sybil-arena:9101"
              severity: critical
              component: arena
            exp_annotations:
              summary: "Arena scrape target is down"
              description: "VictoriaMetrics has not been able to scrape the Arena runner for 3m. Trading and Arena-owned liveness signals may be unavailable."

  - interval: 1m
    input_series:
      - series: 'sybil_reference_prices_active_total{job="sybil-api"}'
        values: "7+0x20"
    alert_rule_test:
      - eval_time: 20m
        alertname: ReferencePriceFeedMissing
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'sybil_reference_prices_active_total{job="sybil-api"}'
        values: "0+0x10"
    alert_rule_test:
      - eval_time: 2m
        alertname: ReferencePriceFeedMissing
        exp_alerts: []
      - eval_time: 4m
        alertname: ReferencePriceFeedMissing
        exp_alerts:
          - exp_labels:
              severity: critical
              component: polymarket
            exp_annotations:
              summary: "Polymarket reference-price feed is empty"
              description: "No active Polymarket reference price has been present for 3m. The curated feed, mirror process, or API update path is broken."

  - interval: 1m
    input_series:
      - series: 'sybil_reference_prices_expired_total{job="sybil-api",instance="sybil-api:3000"}'
        values: "2+0x5"
    alert_rule_test:
      - eval_time: 1m
        alertname: ReferencePriceTokensExpired
        exp_alerts: []
      - eval_time: 3m
        alertname: ReferencePriceTokensExpired
        exp_alerts:
          - exp_labels:
              severity: warning
              component: polymarket
            exp_annotations:
              summary: "One or more reference-price tokens expired"
              description: "At least one stored reference price exceeded the API per-market TTL for 2m (expired tokens: 2). Public market reads now omit those values, and Arena reference-required selection cannot use them."

  - interval: 1m
    input_series:
      - series: 'sybil_markets_active_total{job="sybil-api"}'
        values: "207+0x20"
      - series: 'sybil_arena_synthetic_markets{job="sybil-arena"}'
        values: "12+0x20"
    alert_rule_test:
      - eval_time: 14m
        alertname: ArenaSyntheticCoverageLow
        exp_alerts: []
      - eval_time: 16m
        alertname: ArenaSyntheticCoverageLow
        exp_alerts:
          - exp_labels:
              severity: warning
              component: arena
            exp_annotations:
              summary: "Arena synthetic flow covers too little of the live market universe"
              description: "The selected synthetic cohort is below 90% of active outcome rows for 15m. A stale selection cap, lifecycle filter, or missing market provenance may be leaving most product markets inert."

  - interval: 1m
    input_series:
      - series: 'sybil_markets_active_total{job="sybil-api"}'
        values: "207+0x20"
      - series: 'sybil_arena_synthetic_markets{job="sybil-arena"}'
        values: "206+0x20"
    alert_rule_test:
      - eval_time: 20m
        alertname: ArenaSyntheticCoverageLow
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'sybil_arena_synthetic_markets{job="sybil-arena"}'
        values: "206+0x20"
      - series: 'sybil_bot_total_orders{job="sybil-arena",trader="Noise-0"}'
        values: "40+0x20"
    alert_rule_test:
      - eval_time: 14m
        alertname: ArenaSyntheticNoiseStalled
        exp_alerts: []
      - eval_time: 16m
        alertname: ArenaSyntheticNoiseStalled
        exp_alerts:
          - exp_labels:
              severity: warning
              component: arena
            exp_annotations:
              summary: "Arena synthetic noise stopped submitting orders"
              description: "Arena selected a synthetic market cohort but noise-trader order totals have not increased for 15m. Check actor tasks, pending order lifetime, balances, and block-stream progress; selection coverage alone does not prove live flow."

  - interval: 1m
    input_series:
      - series: 'sybil_arena_synthetic_markets{job="sybil-arena"}'
        values: "206+0x20"
      - series: 'sybil_bot_total_orders{job="sybil-arena",trader="Noise-0"}'
        values: "0+4x20"
    alert_rule_test:
      - eval_time: 20m
        alertname: ArenaSyntheticNoiseStalled
        exp_alerts: []
