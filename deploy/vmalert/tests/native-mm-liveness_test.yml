# Prometheus-compatible tests for native market-maker scrape and quote-loop liveness.

rule_files:
  - ../rules.yml

evaluation_interval: 1m

tests:
  - name: missing native MM scrape target pages
    interval: 1m
    input_series:
      - series: 'up{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "0+0x5"
    alert_rule_test:
      - eval_time: 2m
        alertname: NativeMarketMakerDown
        exp_alerts: []
      - eval_time: 4m
        alertname: NativeMarketMakerDown
        exp_alerts:
          - exp_labels:
              job: sybil-native-mm
              instance: "sybil-native-mm:9104"
              severity: critical
              component: native-mm
            exp_annotations:
              summary: "Native market-maker scrape target is down"
              description: "VictoriaMetrics has not been able to scrape the native MM for 3m. Check the container, monitoring listener, and actor task."

  - name: stale native MM quote loop pages while scrape remains up
    interval: 1m
    input_series:
      - series: 'up{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "1+0x5"
      - series: 'sybil_native_mm_ready{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "0+0x5"
    alert_rule_test:
      - eval_time: 1m
        alertname: NativeMarketMakerNotReady
        exp_alerts: []
      - eval_time: 3m
        alertname: NativeMarketMakerNotReady
        exp_alerts:
          - exp_labels:
              job: sybil-native-mm
              instance: "sybil-native-mm:9104"
              severity: critical
              component: native-mm
            exp_annotations:
              summary: "Native market-maker quote loop is not ready"
              description: "The native MM has failed its full operating contract for 2m: fresh progress, eligible markets, quote coverage, normal risk mode, and recent accepted submissions are all required. Follow the MM liveness runbook."

  - name: eligible native MM with no quotes pages
    interval: 1m
    input_series:
      - series: 'sybil_native_mm_eligible_quote_markets{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "10+0x4"
      - series: 'sybil_native_mm_quoted_markets{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "0+0x4"
    alert_rule_test:
      - eval_time: 2m
        alertname: NativeMarketMakerNoQuotes
        exp_alerts:
          - exp_labels:
              job: sybil-native-mm
              instance: "sybil-native-mm:9104"
              severity: critical
              component: native-mm
            exp_annotations:
              summary: "Native MM is eligible but submitting no quotes"
              description: "The native MM has eligible markets but its selected quote set has covered zero markets for 1m. Check risk mode, position sync, and quote-generation diagnostics."

  - name: partial native MM coverage warns
    interval: 1m
    input_series:
      - series: 'sybil_native_mm_eligible_quote_markets{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "10+0x6"
      - series: 'sybil_native_mm_quoted_markets{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "8+0x6"
    alert_rule_test:
      - eval_time: 4m
        alertname: NativeMarketMakerCoverageLow
        exp_alerts:
          - exp_labels:
              job: sybil-native-mm
              instance: "sybil-native-mm:9104"
              severity: warning
              component: native-mm
            exp_annotations:
              summary: "Native MM quote coverage is below 95%"
              description: "Fewer than 95% of eligible native markets have a quote. Compare eligible, quoted, two-sided, and order-cap metrics."

  - name: accepted native MM submission lag pages
    interval: 1m
    input_series:
      - series: 'sybil_native_mm_submission_lag_blocks{job="sybil-native-mm",instance="sybil-native-mm:9104"}'
        values: "4+0x5"
    alert_rule_test:
      - eval_time: 3m
        alertname: NativeMarketMakerSubmissionStalled
        exp_alerts:
          - exp_labels:
              job: sybil-native-mm
              instance: "sybil-native-mm:9104"
              severity: critical
              component: native-mm
            exp_annotations:
              summary: "Native MM quote bundles are not being accepted"
              description: "The native MM is attempting non-empty bundles but has no accepted submission within two observed blocks. Inspect structured API rejection logs and submission failure counters."
