# promtool tests for SYB-250's synthetic probe alerts.
# Run: promtool test rules deploy/vmalert/tests/synthetic-probe_test.yml

rule_files:
  - ../rules.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_probe_failure{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "0+0x4 1+0x5"
    alert_rule_test:
      - eval_time: 4m
        alertname: SyntheticProbeFailed
        exp_alerts: []
      - eval_time: 6m
        alertname: SyntheticProbeFailed
        exp_alerts:
          - exp_labels:
              job: "sybil-synthetic"
              instance: "https://172-104-31-54.nip.io"
              severity: critical
              component: synthetic-monitor
            exp_annotations:
              summary: "External Sybil synthetic probe failed"
              description: "The five-minute read-only probe failed for https://172-104-31-54.nip.io. Health, block advancement, markets, CORS, or container health is broken; inspect the systemd journal for the one-line cause."

  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_probe_failure{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "1+0x4 0+0x5"
    alert_rule_test:
      - eval_time: 6m
        alertname: SyntheticProbeFailed
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_probe_failure{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "0 _x20"
    alert_rule_test:
      - eval_time: 14m
        alertname: SyntheticProbeMissing
        exp_alerts: []
      - eval_time: 16m
        alertname: SyntheticProbeMissing
        exp_alerts:
          - exp_labels:
              job: "sybil-synthetic"
              severity: warning
              component: synthetic-monitor
            exp_annotations:
              summary: "Sybil synthetic probe has stopped reporting"
              description: "No synthetic result reached VictoriaMetrics for 15m. Check the sybil-synthetic-probe timer, Docker access, and VictoriaMetrics ingestion."

  # Proof-lag samples arrive on the probe's five-minute cadence; last_over_time
  # bridges the gaps. A wedged prover pipeline grows ~30 blocks per cycle at the
  # 10s cadence, so lag crosses the 30-block threshold within one cycle and the
  # alert confirms it over the next two.
  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_proof_lag_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "1 _x4 1 _x4 45 _x4 78 _x4 110 _x4 140 _x4"
      - series: 'sybil_synthetic_proof_lag_limit_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "30 _x4 30 _x4 30 _x4 30 _x4 30 _x4 30 _x4"
    alert_rule_test:
      - eval_time: 19m
        alertname: SyntheticProofLagHigh
        exp_alerts: []
      - eval_time: 21m
        alertname: SyntheticProofLagHigh
        exp_alerts:
          - exp_labels:
              job: "sybil-synthetic"
              instance: "https://172-104-31-54.nip.io"
              severity: warning
              component: prover
            exp_annotations:
              summary: "Proof pipeline is lagging the chain head"
              description: "The synthetic probe measured /proofs/latest beyond its configured lag limit for https://172-104-31-54.nip.io (current lag: 110 blocks). The prover or mock-prover pipeline is likely wedged; see the proof-lag section of the synthetic-monitoring runbook."

  - name: native product liquidity gap persists
    interval: 1m
    input_series:
      - series: 'sybil_synthetic_mm_eligible_markets{job="sybil-synthetic",instance="https://172-104-31-54.nip.io",catalog="native"}'
        values: "134+0x20"
      - series: 'sybil_synthetic_mm_liquid_markets{job="sybil-synthetic",instance="https://172-104-31-54.nip.io",catalog="native"}'
        values: "97+0x20"
    alert_rule_test:
      - eval_time: 9m
        alertname: NativeMarketMakerProductLiquidityLow
        exp_alerts: []
      - eval_time: 11m
        alertname: NativeMarketMakerProductLiquidityLow
        exp_alerts:
          - exp_labels:
              job: "sybil-synthetic"
              instance: "https://172-104-31-54.nip.io"
              catalog: native
              severity: warning
              component: native-mm
            exp_annotations:
              summary: "Native MM product liquidity is below 95%"
              description: "The external probe sees nonzero rolling liquidity on fewer than 95% of active native markets. Actor-local quote counters may be green; compare product marks, NO-side price normalization, and the current batch quote bundle."

  - name: polymarket product liquidity gap recovers
    interval: 1m
    input_series:
      - series: 'sybil_synthetic_mm_eligible_markets{job="sybil-synthetic",instance="https://172-104-31-54.nip.io",catalog="polymarket"}'
        values: "60+0x20"
      - series: 'sybil_synthetic_mm_liquid_markets{job="sybil-synthetic",instance="https://172-104-31-54.nip.io",catalog="polymarket"}'
        values: "40+0x5 60+0x15"
    alert_rule_test:
      - eval_time: 9m
        alertname: PolymarketMarketMakerProductLiquidityLow
        exp_alerts: []
      - eval_time: 12m
        alertname: PolymarketMarketMakerProductLiquidityLow
        exp_alerts: []

  # Healthy devnet: the mock prover trails by at most a block or two.
  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_proof_lag_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "0 _x4 1 _x4 0 _x4 1 _x4"
      - series: 'sybil_synthetic_proof_lag_limit_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "30 _x4 30 _x4 30 _x4 30 _x4"
    alert_rule_test:
      - eval_time: 19m
        alertname: SyntheticProofLagHigh
        exp_alerts: []

  # A one-cycle spike that recovers before the 10m confirmation never fires.
  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_proof_lag_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "45 _x4 45 _x4 2 _x4 2 _x4"
      - series: 'sybil_synthetic_proof_lag_limit_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "30 _x4 30 _x4 30 _x4 30 _x4"
    alert_rule_test:
      - eval_time: 9m
        alertname: SyntheticProofLagHigh
        exp_alerts: []
      - eval_time: 12m
        alertname: SyntheticProofLagHigh
        exp_alerts: []

  # A deliberately raised ceiling must govern the alert as well as the probe.
  # This is the documented real-prover bring-up posture: 45 blocks is above the
  # devnet default but remains healthy under a configured 100-block limit.
  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_proof_lag_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "45 _x4 45 _x4 45 _x4 45 _x4"
      - series: 'sybil_synthetic_proof_lag_limit_blocks{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "100 _x4 100 _x4 100 _x4 100 _x4"
    alert_rule_test:
      - eval_time: 19m
        alertname: SyntheticProofLagHigh
        exp_alerts: []
