# promtool tests for SYB-250's synthetic probe alerts.
# Run: promtool test rules deploy/vmalert/tests/synthetic-probe_test.yml

rule_files:
  - ../rules.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_probe_failure{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "0+0x4 1+0x5"
    alert_rule_test:
      - eval_time: 4m
        alertname: SyntheticProbeFailed
        exp_alerts: []
      - eval_time: 6m
        alertname: SyntheticProbeFailed
        exp_alerts:
          - exp_labels:
              job: "sybil-synthetic"
              instance: "https://172-104-31-54.nip.io"
              severity: critical
              component: synthetic-monitor
            exp_annotations:
              summary: "External Sybil synthetic probe failed"
              description: "The five-minute read-only probe failed for https://172-104-31-54.nip.io. Health, block advancement, markets, CORS, or container health is broken; inspect the systemd journal for the one-line cause."

  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_probe_failure{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "1+0x4 0+0x5"
    alert_rule_test:
      - eval_time: 6m
        alertname: SyntheticProbeFailed
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'sybil_synthetic_probe_failure{job="sybil-synthetic",instance="https://172-104-31-54.nip.io"}'
        values: "0 _x20"
    alert_rule_test:
      - eval_time: 14m
        alertname: SyntheticProbeMissing
        exp_alerts: []
      - eval_time: 16m
        alertname: SyntheticProbeMissing
        exp_alerts:
          - exp_labels:
              job: "sybil-synthetic"
              severity: warning
              component: synthetic-monitor
            exp_annotations:
              summary: "Sybil synthetic probe has stopped reporting"
              description: "No synthetic result reached VictoriaMetrics for 15m. Check the sybil-synthetic-probe timer, Docker access, and VictoriaMetrics ingestion."
