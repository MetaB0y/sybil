apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    uid: victoriametrics
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false

  - name: vmalert
    type: prometheus
    uid: vmalert
    access: proxy
    url: http://vmalert:8880
    editable: false
    jsonData:
      manageAlerts: false
