scrape_configs:
  - job_name: sybil-api
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-api:3000"]

  - job_name: sybil-arena
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-arena:9101"]

  - job_name: sybil-native-mm
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-native-mm:9104"]

  - job_name: sybil-polymarket
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-polymarket:9105"]

  - job_name: node
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["node-exporter:9100"]
