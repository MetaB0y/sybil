scrape_configs:
  - job_name: sybil-api
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-api:3000"]

  - job_name: sybil-prover
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    # Optional Compose profiles appear in Docker DNS only while enabled. DNS
    # discovery therefore creates no false down target for the product devnet,
    # while retaining the same job label and alerts for explicit validity runs.
    dns_sd_configs:
      - names: ["sybil-prover"]
        type: A
        port: 3002

  - job_name: sybil-arena
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-arena:9101"]

  - job_name: sybil-native-mm
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-native-mm:9104"]

  - job_name: sybil-polymarket
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-polymarket:9105"]

  # The service is opt-in under the Compose `l1-indexer` profile. DNS discovery
  # omits the target until a vault/RPC deployment is explicitly configured.
  - job_name: sybil-l1-indexer
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["sybil-l1-indexer"]
        type: A
        port: 9102

  - job_name: node
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["node-exporter:9100"]
