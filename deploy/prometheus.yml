scrape_configs:
  - job_name: sybil-api
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-api:3000"]

  - job_name: sybil-prover
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-prover:3002"]

  - job_name: node
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["node-exporter:9100"]
