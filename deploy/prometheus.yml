scrape_configs:
  - job_name: sybil-api
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-api:3000"]

  - job_name: sybil-prover
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-prover:3002"]

  - job_name: sybil-arena
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-arena:9101"]

  # The service is opt-in under the Compose `l1-indexer` profile. An absent
  # target is expected until a vault/RPC deployment is explicitly configured.
  - job_name: sybil-l1-indexer
    scrape_interval: 10s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets: ["sybil-l1-indexer:9102"]

  - job_name: node
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["node-exporter:9100"]
