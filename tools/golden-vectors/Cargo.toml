[package]
name = "sybil-golden-vectors"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Deterministic cross-language golden-vector generator for Sybil"
publish = false

[[bin]]
name = "emit-golden"
path = "src/main.rs"

[dependencies]
alloy = { workspace = true, features = ["std"] }
hex = { workspace = true }
blake3 = { workspace = true }
matching-engine = { path = "../../crates/matching-engine" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = "0.11"
sha3 = { workspace = true }
sybil-l1-protocol = { path = "../../crates/sybil-l1-protocol" }
sybil-l1-abi = { path = "../../crates/sybil-l1-abi" }
sybil-verifier = { path = "../../crates/sybil-verifier" }
sybil-zk = { path = "../../crates/sybil-zk" }

[lints.clippy]
disallowed_types = "allow"
