[package]
name = "sybil-golden-vectors"
version = "0.1.0"
edition = "2021"
description = "Deterministic cross-language golden-vector generator for Sybil"
publish = false

[[bin]]
name = "emit-golden"
path = "src/main.rs"

[dependencies]
hex = "0.4"
blake3 = "1"
matching-engine = { path = "../../crates/matching-engine" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
sha3 = "0.12"
sybil-l1-protocol = { path = "../../crates/sybil-l1-protocol" }
sybil-verifier = { path = "../../crates/sybil-verifier" }
sybil-zk = { path = "../../crates/sybil-zk" }

[lints.clippy]
disallowed_types = "allow"
