name: CI

# SYB-251: Actions billing is intentionally off — every automatic run fails to
# start and burns nothing but noise. Manual dispatch only until billing returns;
# the merge gate is the local double-gate (just check-all before every land).
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.0"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check Rust workspace metadata # just rust-workspaces-check
        run: ./scripts/check-rust-workspaces.py

      - name: Check formatting # just fmt-check
        run: cargo fmt --all -- --check

      - name: Check all targets and features # just workspace-check-all
        run: cargo check --workspace --all-targets --all-features

      - name: Clippy # just lint-all
        run: cargo clippy --workspace --all-targets --all-features

      - name: Test # just test
        run: cargo test --workspace

  standalone-rust:
    name: Standalone Rust Workspaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            fuzz
            zk/openvm-guest
            zk/openvm-escape-guest
            zk/openvm-tools

      - name: Compile standalone Cargo workspaces # just standalone-check
        run: ./scripts/check-rust-standalone.sh

  docs:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Validate architecture vault
        run: |
          ./scripts/update-protocol-pins.py --check
          ./scripts/check-doc-sync.py
          ./scripts/check-vault.sh

      - name: Build documentation strictly
        env:
          NO_MKDOCS_2_WARNING: "1"
          PYTHONWARNINGS: "ignore::DeprecationWarning"
        run: uvx --with mkdocs==1.6.1 --with mkdocs-material==9.7.6 --with mkdocs-roamlinks-plugin==0.3.2 mkdocs build --strict

      - name: Render Mermaid diagrams
        run: ./scripts/check-mermaid.sh

      - name: Check maintained external links
        run: ./scripts/check-external-links.py

  arena:
    name: Arena
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Arena dependencies
        working-directory: arena
        run: uv sync

      - name: Ruff
        working-directory: arena
        run: uv run ruff check .

      - name: Pytest
        working-directory: arena
        run: uv run pytest -q

  feature-lattice:
    name: Feature Lattice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.0"

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-hack

      - name: Workspace without default features
        run: cargo hack check --workspace --no-default-features --no-dev-deps

      - name: matching-solver features
        run: cargo hack check -p matching-solver --each-feature --no-dev-deps

      - name: matching-sim features
        run: cargo hack check -p matching-sim --each-feature --no-dev-deps

      - name: sybil-api-types features
        run: cargo hack check -p sybil-api-types --each-feature --no-dev-deps

      - name: sybil-prover features
        run: cargo hack check -p sybil-prover --each-feature --no-dev-deps

      - name: sybil-verifier features
        run: cargo hack check -p sybil-verifier --each-feature --no-dev-deps

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sybil-api:ci .

  smoke:
    name: API Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.0"

      - uses: Swatinem/rust-cache@v2

      # `just smoke` — build sybil-api, boot it in --dev-mode, and drive the full
      # account -> market -> order -> fill -> resolution lifecycle over HTTP. The
      # script (scripts/smoke-test.sh) builds the release binary itself, is
      # fail-closed (set -euo pipefail; any failed assertion exits 1), and tears
      # the server down on exit. Dev-mode produces blocks on a fast interval, so
      # the fills/resolution waits (<=10s each) are comfortably in budget.
      - name: E2E smoke test # just smoke
        run: ./scripts/smoke-test.sh

  compose-profile-smoke:
    name: Compose Profile Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cheap, no containers: `docker compose config` only parses/merges the
      # compose files and asserts the prover-worker profile boundary. Docker
      # Compose v2 ships on ubuntu-latest, so no extra setup is needed.
      - name: Compose profile boundary check # scripts/compose-profile-smoke.sh
        run: ./scripts/compose-profile-smoke.sh

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Check Solidity formatting
        working-directory: contracts
        run: forge fmt --check

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Test contracts
        working-directory: contracts
        run: forge test -vvv

  zk:
    name: ZK Guest & Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.0"
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate, out-of-workspace crates pinned to the OpenVM v2.0.0
          # git dependency graph; cache their target dirs independently.
          workspaces: |
            zk/openvm-tools
            zk/openvm-guest
            zk/openvm-escape-guest

      # Consensus-surface staleness gate: fail if the OpenVM guest source
      # changed without regenerating the pinned commitment. Compares only;
      # never rebuilds or updates the pin. See scripts/zk-guest-fingerprint.sh.
      - name: Guest commitment staleness gate
        run: scripts/zk-guest-fingerprint.sh --check

      - name: Canonical golden-vector staleness gate
        run: cargo run -p sybil-golden-vectors --bin emit-golden -- --check

      - name: Deployment validity-pin coordination gate
        run: ./scripts/update-validity-pins.py --check

      - name: Validity deployment-boundary fixture tests
        run: ./scripts/test-validity-boundary.py

      - name: Validity deployment-boundary declaration gate
        run: ./scripts/check-validity-boundary.py --check

      # Host-side encoder (not consensus surface). Full check + clippy.
      - name: Check openvm-tools
        working-directory: zk/openvm-tools
        run: cargo clippy --tests --all-features

      # Generate the config-derived, gitignored include that cargo-openvm
      # normally writes before compiling a guest. This keeps the fast host lane
      # reproducible from a clean checkout without installing the heavy guest
      # toolchain; the rebuild workflow still owns real guest compilation.
      - name: Generate OpenVM host-check init files
        run: ./scripts/generate-openvm-init.py zk/openvm-guest zk/openvm-escape-guest

      # Guest crates checked with the normal host compiler (the same checks as
      # `just openvm-guest-check`). This validates the guest source compiles;
      # it does NOT rebuild the zkVM artifact / commitment, which requires the
      # pinned `cargo-openvm` CLI + risc0 target toolchain and stays a local /
      # release step. The guest is consensus surface: this job must never
      # regenerate its artifact, only host-check the source unchanged.
      - name: Host-check openvm-guest
        working-directory: zk/openvm-guest
        run: cargo clippy --tests

      - name: Host-check openvm-escape-guest
        working-directory: zk/openvm-escape-guest
        run: cargo clippy --tests
