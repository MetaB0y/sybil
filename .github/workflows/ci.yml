name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-features

      - name: Test
        run: cargo test --workspace

  docs:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate architecture vault
        run: ./scripts/check-vault.sh

  arena:
    name: Arena
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Arena dependencies
        working-directory: arena
        run: uv sync

      - name: Ruff
        working-directory: arena
        run: uv run ruff check .

      - name: Pytest
        working-directory: arena
        run: uv run pytest -q

  feature-lattice:
    name: Feature Lattice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-hack

      - name: Workspace without default features
        run: cargo hack check --workspace --no-default-features --no-dev-deps

      - name: matching-solver features
        run: cargo hack check -p matching-solver --each-feature --no-dev-deps

      - name: matching-sim features
        run: cargo hack check -p matching-sim --each-feature --no-dev-deps

      - name: sybil-api-types features
        run: cargo hack check -p sybil-api-types --each-feature --no-dev-deps

      - name: sybil-witgen features
        run: cargo hack check -p sybil-witgen --each-feature --no-dev-deps

      - name: sybil-verifier features
        run: cargo hack check -p sybil-verifier --each-feature --no-dev-deps

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sybil-api:ci .

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Check Solidity formatting
        working-directory: contracts
        run: forge fmt --check

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Test contracts
        working-directory: contracts
        run: forge test -vvv
