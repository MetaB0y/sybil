name: ZK Rebuild Reproducibility

# Rebuilds both OpenVM guests from source and checks whether the regenerated
# commitments still match both committed release records.
#
# This lane is a HARD GATE: regenerated commits must equal the committed
# commit.json files. If it goes red, either source changed without a coordinated
# repin or the build stopped being reproducible.
#
# SYB-228: this gate also requires the four pinned, hash-checked OpenVM key
# files to be provisioned (they are intentionally untracked and cannot be
# regenerated on the CI box). It invokes the path-remapping just recipe, so
# the guest commitment reproduces regardless of the runner's checkout path.
#
# The fast ZK job in ci.yml only host-checks and runs staleness gates; it never
# rebuilds consensus artifacts.

# SYB-251: schedule removed while Actions billing is off (see ci.yml) — a
# weekly guaranteed-failure is worse than no run. Re-add the Monday 06:00 UTC
# cron ("0 6 * * 1") when billing returns.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  OPENVM_TAG: v2.0.0
  # Nightly the OpenVM guest build driver invokes (cargo +<toolchain> build
  # --target riscv32im-risc0-zkvm-elf -Z build-std=...). Keep in sync with the
  # toolchain cargo-openvm v2.0.0 selects locally.
  GUEST_NIGHTLY: nightly-2026-01-18

jobs:
  zk-rebuild:
    name: Rebuild both guests & compare commitments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Host toolchain used to compile the workspace crates the guest pulls in.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.0"

      # Guest nightly with rust-src so `-Z build-std` can build the zkVM target.
      - name: Install guest nightly toolchain
        run: |
          rustup toolchain install "$GUEST_NIGHTLY" --profile minimal --component rust-src
          rustup target add riscv32im-risc0-zkvm-elf --toolchain "$GUEST_NIGHTLY" || true

      - uses: Swatinem/rust-cache@v2
        with:
          # Dedicated cache key for the out-of-workspace OpenVM crates; do not
          # share with the fast zk job's cache.
          key: zk-rebuild
          workspaces: |
            zk/openvm-guest
            zk/openvm-escape-guest
            zk/openvm-tools

      - uses: taiki-e/install-action@just

      # cargo-openvm is expensive to build from the git tag; cache the installed
      # binary keyed on the pinned tag.
      - name: Cache cargo-openvm binary
        id: cache-openvm
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-openvm
          key: cargo-openvm-${{ env.OPENVM_TAG }}

      - name: Install cargo-openvm (pinned)
        if: steps.cache-openvm.outputs.cache-hit != 'true'
        run: |
          cargo +1.91 install --locked \
            --git https://github.com/openvm-org/openvm.git \
            --tag "$OPENVM_TAG" cargo-openvm

      - name: Rebuild and compare both guest commitments
        run: just zk-rebuild-check

      - name: Record successful reproducibility gate
        run: |
          {
            echo "## ZK rebuild reproducibility"
            echo ""
            echo "Both OpenVM guests reproduced their committed executable and VM commitments."
            echo ""
            echo "- OpenVM tag: \`$OPENVM_TAG\`"
            echo "- Guest nightly: \`$GUEST_NIGHTLY\`"
          } >> "$GITHUB_STEP_SUMMARY"
