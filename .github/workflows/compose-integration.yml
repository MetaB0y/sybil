name: Compose Integration

# SYB-251: schedule removed while Actions billing is off (see ci.yml).
# Re-add the nightly cron ("23 3 * * *") when billing returns.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TMPDIR: /home/runner/work/_temp

jobs:
  itest-compose:
    name: Deterministic Compose Money Path
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.97.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: taiki-e/install-action@1e7bd61f4b270e749b15995a9e7aa0fe7449dc13 # just

      - name: Compose account-to-fill integration # just itest-compose
        run: just itest-compose
